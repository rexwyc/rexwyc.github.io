];

let totalScore = 0;
const quizContainer = document.getElementById('quiz-container');
const scoreDisplay = document.getElementById('current-score');

let currentCategory = "";

quizData.forEach((item, index) => {
    // Inject Category Heading if it changes
    if (item.category !== currentCategory) {
        currentCategory = item.category;
        const catHeader = document.createElement('h2');
        catHeader.className = 'category-title';
        catHeader.innerText = currentCategory;
        quizContainer.appendChild(catHeader);
    }

    // Question Block Setup
    const qBlock = document.createElement('div');
    qBlock.className = 'question-block';
    
    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerText = item.q;
    qBlock.appendChild(qText);
    
    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'options';
    
    // Generate choice options
    ['A', 'B', 'C', 'D'].forEach(letter => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        
        const wordText = document.createElement('span');
        wordText.innerText = letter + ") " + item.opts[letter][0];
        
        const transText = document.createElement('span');
        transText.className = 'translation';
        transText.innerText = item.opts[letter][1];
        
        btn.appendChild(wordText);
        btn.appendChild(transText);
        
        // Handle answer selection click
        btn.onclick = () => {
            const allBtns = optionsDiv.querySelectorAll('.option-btn');
            
            // Highlight right and wrong answers
            allBtns.forEach(b => {
                b.disabled = true;
                const currentLetter = b.innerText.charAt(0);
                if (currentLetter === item.ans) {
                    b.classList.add('correct');
                }
                b.querySelector('.translation').style.display = 'inline-block';
            });
            
            if (letter === item.ans) {
                totalScore++;
                scoreDisplay.innerText = totalScore;
            } else {
                btn.classList.add('incorrect');
            }
        };
        
        optionsDiv.appendChild(btn);
    });
    
    qBlock.appendChild(optionsDiv);
    quizContainer.appendChild(qBlock);
});
</script>
