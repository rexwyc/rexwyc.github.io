<html lang="en">

    <meta charset="UTF-8">

    <title>✨ English Fill · Synonyms Tip + Chinese Meaning</title>

        * {

            padding: 0;
        }

            margin: 0;
        }
        .game-card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 250, 245, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 48px 48px 36px 36px;
            padding: 28px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12), 0 8px 18px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 242, 232, 0.6);
            transition: all 0.2s;
        }
        h1 {
            font-weight: 400;
            font-size: 1.7rem;
            letter-spacing: 2px;
            color: #3d2e26;
            text-align: center;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 1rem;
            font-weight: 300;
            color: #7a6458;
            letter-spacing: 0.5px;
            background: #ede5dd;
            padding: 2px 18px;
            border-radius: 40px;
        }
        .sentence-box {
            background: #fffbf8;
            padding: 24px 18px 20px;
            border-radius: 36px;
            margin: 16px 0 12px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.02), 0 6px 12px rgba(0,0,0,0.03);
            border: 1px solid #efe7df;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .sentence-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #2f241d;
            font-weight: 350;
            word-break: break-word;
            width: 100%;
            text-align: left;
        }
        .sentence-text .blank-highlight {
            display: inline-block;
            min-width: 90px;
            border-bottom: 3px dashed #b2907c;
            margin: 0 4px;
            padding: 0 4px;
            color: #4f3a2e;
            font-weight: 550;
            background: #f2eae2;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        .synonym-tip {
            margin-top: 8px;
            font-size: 0.95rem;
            color: #4a6a7a;
            background: #e8edf0;
            padding: 4px 16px;
            border-radius: 30px;
            display: inline-block;
            font-weight: 450;
            letter-spacing: 0.3px;
            border: 1px solid #cbd8e0;
        }
        .synonym-tip span {
            font-weight: 600;
            color: #2d4a5a;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 18px 0 14px;
        }
        .option-btn {
            background: #f7efe8;
            border: 1px solid #dccfc4;
            border-radius: 60px;
            padding: 16px 6px;
            font-size: 1.2rem;
            font-weight: 450;
            color: #2f241d;
            box-shadow: 0 4px 0 #cbb8ab;
            transition: all 0.08s ease;
            text-align: center;
            letter-spacing: 0.3px;
            word-break: break-word;
            line-height: 1.3;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #cbb8ab;
        }
        .option-btn.correct-glow {
            background: #b7d7b0;
            border-color: #5f8b4b;
            box-shadow: 0 4px 0 #3d6b2a;
            color: #1d3d12;
        }
        .option-btn.wrong-glow {
            background: #f4c9c9;
            border-color: #b15a5a;
            box-shadow: 0 4px 0 #8f3e3e;
            color: #571f1f;
        }
        .option-btn.disabled-true {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .feedback-area {
            min-height: 55px;
            padding: 10px 12px;
            margin: 8px 0 14px;
            background: #f2e9e1;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #3d2e26;
            border: 1px solid #e0d2c6;
            text-align: center;
            flex-wrap: wrap;
            gap: 4px 10px;
        }
        .feedback-area .meaning-tag {
            background: #dacfc5;
            padding: 2px 16px;
            border-radius: 30px;
            font-weight: 500;
            color: #2d1f18;
            font-size: 1rem;
        }
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 14px 20px;
            margin-top: 8px;
        }
        .next-btn, .restart-btn, .music-btn {
            background: #dacfc5;
            border: none;
            border-radius: 80px;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: 450;
            color: #2d1f18;
            box-shadow: 0 5px 0 #b3a397;
            transition: all 0.08s ease;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            flex: 1 1 auto;
            min-width: 130px;
            border: 1px solid #cdbcaf;
            letter-spacing: 0.8px;
        }
        .music-btn {
            background: #d4c5b8;
            box-shadow: 0 5px 0 #b09a8a;
        }
        .music-btn.playing {
            background: #b8c5b0;
            box-shadow: 0 5px 0 #8aa37a;
            border-color: #7a966a;
        }
        .next-btn:active, .restart-btn:active, .music-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #b3a397;
        }
        .next-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b3a397;
        }
        .progress-badge {
            font-size: 1rem;
            background: #e6dbd1;
            padding: 8px 22px;
            border-radius: 60px;
            color: #3f2e24;
            font-weight: 350;
            letter-spacing: 0.4px;
        }
        .footnote {
            margin-top: 18px;
            color: #6f5d50;
            font-size: 0.85rem;
            opacity: 0.9;
            text-align: center;
        }
        /* Hidden audio element */
        #audioPlayer {
            display: none;
        }
        @media (max-width: 480px) {
            .game-card { padding: 18px 12px 22px; }
            .sentence-text { font-size: 1.3rem; }
            .option-btn { font-size: 1rem; padding: 14px 4px; }
            .feedback-area { font-size: 1rem; min-height: 44px; }
            .next-btn, .restart-btn, .music-btn { font-size: 1rem; padding: 12px 16px; min-width: 100px; }
            .synonym-tip { font-size: 0.8rem; }
        }
    </style>
</head>

    <!-- feedback area -->

    <div class="footnote">• all vocab included • phone friendly •</div>
</div>

        // Generate question
        function generateQuestion() {
            const randomIndex = Math.floor(Math.random() * totalVocab);
            const entry = vocab[randomIndex];
            const correctWord = entry.word;
            const correctTranslation = entry.translation;
            const synonyms = entry.synonyms || "similar words";

            // Build options: 1 correct English + 3 distractors
            let candidates = [correctTranslation];
            const allTranslations = vocab.map(item => item.translation);
            const filterTrans = allTranslations.filter(t => t !== correctTranslation);
            const shuffledFilter = shuffleArray([...filterTrans]);
            for (let i = 0; i < Math.min(3, shuffledFilter.length); i++) {
                if (!candidates.includes(shuffledFilter[i])) {
                    candidates.push(shuffledFilter[i]);
                }
            }
            while (candidates.length < 4) {
                const fallback = ["familiar", "joyful", "sad", "treasure", "memory", "quiet", "heavy", "strange", "happy", "calm", "gentle", "bright"];
                for (let f of fallback) {
                    if (!candidates.includes(f) && f !== correctTranslation) {
                        candidates.push(f);
                        if (candidates.length === 4) break;
                    }
                }
                if (candidates.length < 4) candidates.push("unknown");
            }
            const shuffledOptions = shuffleArray([...candidates]);

            // Generate a meaningful sentence
            const template = generateSentence();

            return {
                correctWord: correctWord,
                correctTranslation: correctTranslation,
                synonyms: synonyms,
                options: shuffledOptions,
                prefix: template.prefix + ' ',
                suffix: ' ' + template.suffix
            };
        }

        // Render question
        function renderQuestion() {
            const q = generateQuestion();
            currentQuestion = q;
            answered = false;

            sentencePrefix.textContent = q.prefix;
            blankWord.textContent = '______';
            sentenceSuffix.textContent = q.suffix;

            // Show synonyms as a tip next to the sentence
            synonymTip.innerHTML = `💡 <span>Synonyms:</span> ${q.synonyms}`;

            optionsBtns.forEach((btn, idx) => {
                btn.textContent = q.options[idx] || '—';
                btn.className = 'option-btn';
                btn.dataset.translation = q.options[idx] || '';
                btn.disabled = false;
            });

            feedbackEl.innerHTML = '✨ Choose the correct English word';
            feedbackEl.style.color = '#3d2e26';
            questionIndex++;
            progressBadge.textContent = `#${questionIndex}`;
            nextBtn.disabled = true;
        }

        // Handle option click
        function handleOptionClick(e) {
            const btn = e.currentTarget;
            if (answered || btn.disabled) return;
            const selectedTranslation = btn.dataset.translation;
            if (!currentQuestion) return;

            const isCorrect = (selectedTranslation === currentQuestion.correctTranslation);
            optionsBtns.forEach(b => { b.disabled = true; });
            optionsBtns.forEach(b => {
                if (b.dataset.translation === currentQuestion.correctTranslation) {
                    b.classList.add('correct-glow');
                } else if (b === btn && !isCorrect) {
                    b.classList.add('wrong-glow');
                }
            });

            const chineseWord = currentQuestion.correctWord;
            const englishMeaning = currentQuestion.correctTranslation;
            
            if (isCorrect) {
                feedbackEl.innerHTML = `✅ Correct! <span class="meaning-tag">${chineseWord} = ${englishMeaning}</span>`;
                feedbackEl.style.color = '#1f5a1a';
                blankWord.textContent = englishMeaning;
                blankWord.style.color = '#1f5a1a';
                blankWord.style.borderBottom = '3px solid #4b7a3b';
            } else {
                feedbackEl.innerHTML = `❌ Not quite. Correct: <span class="meaning-tag">${chineseWord} = ${englishMeaning}</span>`;
                feedbackEl.style.color = '#8f3a3a';
                blankWord.textContent = englishMeaning;
                blankWord.style.color = '#8f3a3a';
                blankWord.style.borderBottom = '3px solid #b15a5a';
            }
            answered = true;
            nextBtn.disabled = false;
        }

        // Next question

            if (nextBtn.disabled) return;
            blankWord.style.color = '#4f3a2e';
            blankWord.style.borderBottom = '3px dashed #b2907c';
            renderQuestion();
        }

        // Restart

            questionIndex = 0;
            renderQuestion();
            blankWord.style.color = '#4f3a2e';
            blankWord.style.borderBottom = '3px dashed #b2907c';
            feedbackEl.innerHTML = '✨ Restarted!';
            feedbackEl.style.color = '#3d2e26';
            nextBtn.disabled = true;
        }

        // ---------- Event binding ----------
        optionsBtns.forEach(btn => {
            btn.addEventListener('click', handleOptionClick);
        });
        nextBtn.addEventListener('click', nextQuestion);
        restartBtn.addEventListener('click', restartGame);

        // Initialize
        renderQuestion();

        // Mobile double-tap prevention
        document.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });
