<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Angry Birds · Prism Siege</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            min-height: 100vh; 
            background: #0b1a2f; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        .game-container { 
            background: #111; 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid #3a5f7a; 
            box-shadow: 0 0 40px rgba(0, 180, 255, 0.3);
            position: relative;
        }
        canvas { 
            display: block; 
            margin: 0 auto; 
            border-radius: 12px; 
            background-color: #a0d8f0;
            cursor: crosshair; 
            touch-action: none; 
            box-shadow: inset 0 0 20px #4a8bb0;
        }
        .ui-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
            padding: 5px 20px; 
            color: #7fc9ff; 
            gap: 15px;
        }
        button { 
            background: #1e2f3f; 
            border: 1px solid #4a9eff; 
            color: #b0dcff; 
            padding: 10px 22px; 
            cursor: pointer; 
            border-radius: 40px; 
            font-weight: bold; 
            transition: 0.2s; 
            letter-spacing: 0.5px;
        }
        button:hover { 
            background: #4a9eff; 
            color: #0a1a2a; 
            box-shadow: 0 0 20px #4a9eff88;
        }
        .reset-btn {
            border-color: #ffbb66;
            color: #ffbb66;
        }
        .reset-btn:hover {
            background: #ffbb66;
            color: #1a1a1a;
        }
        .debug-info {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 20, 30, 0.85);
            color: #9de0ff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid #2f7a9a;
            pointer-events: none;
            z-index: 999;
        }
        .win-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 30, 40, 0.9);
            color: #ffd966;
            padding: 20px 40px;
            border-radius: 60px;
            font-size: 2.4rem;
            font-weight: bold;
            border: 3px solid #ffbb33;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 60px #ffbb3388;
            pointer-events: none;
            text-shadow: 0 0 20px #ffa500;
            letter-spacing: 2px;
            display: none;
        }
        .bird-counter {
            background: #0f212f;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #2a6a8a;
            font-family: monospace;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="550"></canvas>
    <div class="ui-bar">
        <div class="bird-counter">🐦 <span id="greenCount">0</span> remaining</div>
        <div style="display: flex; gap: 14px; align-items: center;">
            <button id="resetBtn" class="reset-btn">⟳ NEW SIEGE</button>
        </div>
    </div>
    <div id="winMessage" class="win-message">🏆 VICTORY!</div>
</div>
<div id="debug" class="debug-info">🔫 Drag bird · destroy green birds</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1000, H = 550;
        const GRAVITY = 0.28;
        const GROUND_Y = H - 40;
        const SLING_X = 130, SLING_Y = 380;
        const POWER_MULT = 0.19;

        // ----- GAME STATE -----
        let blocks = [];            // prisms
        let greenBirds = [];        // green birds on top
        let lasers = [];           // visual effects (green bird attack)
        let currentBird = null;
        let isDragging = false;
        let gameWon = false;

        // ----- INIT LEVEL (MORE PRISMS) -----
        function initLevel() {
            blocks = [];
            greenBirds = [];
            lasers = [];
            gameWon = false;
            document.getElementById('winMessage').style.display = 'none';

            // ----- 4 prism towers (more prisms!) -----
            const towerPositions = [480, 660, 840, 920]; // extra tower
            // also add a fifth tower closer to center
            const towers = [
                { id: 1, x: 480 },
                { id: 2, x: 660 },
                { id: 3, x: 840 },
                { id: 4, x: 920 },
                { id: 5, x: 380 }  // extra tower on the left
            ];

            towers.forEach(tInfo => {
                // taller prism stack (7 layers)
                const layers = 7;
                for (let i = 0; i < layers; i++) {
                    blocks.push({
                        towerId: tInfo.id,
                        x: tInfo.x - 30, 
                        y: GROUND_Y - (i+1) * 48, 
                        w: 60, 
                        h: 44, 
                        vx: 0, 
                        vy: 0, 
                        hit: false,
                        color: `hsl(${200 + i*8}, 75%, ${45 + i*5}%)`
                    });
                }
                // place green bird on top
                greenBirds.push({
                    parentTowerId: tInfo.id,
                    x: tInfo.x, 
                    y: GROUND_Y - 7 * 48 - 16, 
                    radius: 18,
                    alive: true,
                    vx: 0,
                    vy: 0
                });
            });

            // add a few extra green birds on separate small pedestals (more targets)
            // small prism pedestals
            const extraPositions = [540, 740, 880];
            extraPositions.forEach((xPos, idx) => {
                // small prism base (2 layers)
                for (let i = 0; i < 2; i++) {
                    blocks.push({
                        towerId: 99 + idx, // unique id
                        x: xPos - 18,
                        y: GROUND_Y - (i+1) * 30,
                        w: 36,
                        h: 28,
                        vx: 0,
                        vy: 0,
                        hit: false,
                        color: `hsl(${180 + idx*20}, 70%, 50%)`
                    });
                }
                greenBirds.push({
                    parentTowerId: 99 + idx,
                    x: xPos,
                    y: GROUND_Y - 2 * 30 - 14,
                    radius: 16,
                    alive: true,
                    vx: 0,
                    vy: 0
                });
            });

            // update counter
            updateGreenCount();
            spawnBird();
            updateDebug('🐦 More prisms! Destroy all green birds.');
        }

        // ----- UPDATE GREEN BIRD COUNTER UI -----
        function updateGreenCount() {
            const alive = greenBirds.filter(g => g.alive).length;
            document.getElementById('greenCount').textContent = alive;
        }

        // ----- SPAWN ANGRY BIRD -----
        function spawnBird() {
            currentBird = {
                x: SLING_X, 
                y: SLING_Y, 
                vx: 0, 
                vy: 0, 
                launched: false, 
                dead: false,
                radius: 22
            };
            isDragging = false;
        }

        // ----- CHECK WIN CONDITION -----
        function checkWin() {
            if (gameWon) return true;
            const alive = greenBirds.some(g => g.alive === true);
            updateGreenCount();
            if (!alive && greenBirds.length > 0) {
                gameWon = true;
                document.getElementById('winMessage').style.display = 'block';
                updateDebug('🏆 YOU WIN! All green birds destroyed!');
                return true;
            }
            return false;
        }

        // ----- UPDATE -----
        function update() {
            if (gameWon) {
                // still update physics for debris
            }

            // ----- angry bird physics -----
            if (currentBird && currentBird.launched && !currentBird.dead && !gameWon) {
                currentBird.vy += GRAVITY;
                currentBird.x += currentBird.vx;
                currentBird.y += currentBird.vy;

                // ground collision
                if (currentBird.y + currentBird.radius > GROUND_Y) {
                    currentBird.y = GROUND_Y - currentBird.radius;
                    currentBird.vy *= -0.3;
                    currentBird.vx *= 0.85;
                    if (Math.abs(currentBird.vy) < 0.8) currentBird.vy = 0;
                }

                // out of bounds (dead)
                if (currentBird.x > W + 50 || currentBird.y > H + 50) {
                    currentBird.dead = true;
                }

                // ----- collision with green birds -----
                if (!currentBird.dead) {
                    for (let g of greenBirds) {
                        if (!g.alive) continue;
                        const dx = currentBird.x - g.x;
                        const dy = currentBird.y - g.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < currentBird.radius + g.radius) {
                            g.alive = false;
                            currentBird.dead = true;
                            updateDebug('💥 Green bird destroyed!');
                            lasers.push({ x1: g.x, y1: g.y-10, x2: g.x+20, y2: g.y-30, life: 15 });
                            lasers.push({ x1: g.x, y1: g.y+10, x2: g.x-20, y2: g.y+30, life: 15 });
                            updateGreenCount();
                            checkWin();
                            break;
                        }
                    }
                }

                // collision with prisms (blocks) – tower collapse
                if (!currentBird.dead && !gameWon) {
                    for (let b of blocks) {
                        if (b.hit) continue;
                        if (currentBird.x + currentBird.radius > b.x && 
                            currentBird.x - currentBird.radius < b.x + b.w &&
                            currentBird.y + currentBird.radius > b.y && 
                            currentBird.y - currentBird.radius < b.y + b.h) {
                            // destroy entire tower
                            const towerId = b.towerId;
                            blocks.forEach(nb => {
                                if (nb.towerId === towerId) {
                                    nb.hit = true;
                                    nb.vx = (Math.random() - 0.5) * 5;
                                    nb.vy = -Math.random() * 4 - 1;
                                }
                            });
                            greenBirds.forEach(g => {
                                if (g.parentTowerId === towerId) {
                                    g.alive = false;
                                    updateDebug('💥 Tower collapsed! Green bird eliminated.');
                                }
                            });
                            currentBird.dead = true;
                            updateGreenCount();
                            checkWin();
                            break;
                        }
                    }
                }

                // if bird is dead, respawn after delay
                if (currentBird.dead) {
                    setTimeout(() => {
                        if (!gameWon) {
                            spawnBird();
                            updateDebug('🔄 New bird ready.');
                        }
                    }, 1200);
                }
            }

            // ----- prism physics (falling debris) -----
            blocks.forEach(b => {
                if (b.hit) {
                    b.vy += GRAVITY * 0.6;
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.y + b.h > GROUND_Y) {
                        b.y = GROUND_Y - b.h;
                        b.vy *= -0.2;
                        b.vx *= 0.7;
                        if (Math.abs(b.vy) < 0.5) b.vy = 0;
                    }
                }
            });

            // ----- lasers (visual effects) decay -----
            lasers = lasers.filter(l => l.life-- > 0);

            if (!gameWon) checkWin();
        }

        // ----- DRAWING -----
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            grad.addColorStop(0, '#9acfef');
            grad.addColorStop(1, '#b3dff5');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, GROUND_Y);

            // ground
            ctx.fillStyle = '#2c5e3a';
            ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
            ctx.fillStyle = '#3d7a4a';
            ctx.fillRect(0, GROUND_Y-6, W, 10);

            // slingshot
            ctx.strokeStyle = '#6f4e2e';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(SLING_X, SLING_Y, 40, 0, Math.PI*2);
            ctx.stroke();
            ctx.strokeStyle = '#8b6b44';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(SLING_X, SLING_Y, 48, 0, Math.PI*2);
            ctx.stroke();

            // ----- draw prisms (more colorful) -----
            blocks.forEach(b => {
                if (b.hit) {
                    ctx.fillStyle = '#3a4a5a';
                    ctx.globalAlpha = 0.5;
                } else {
                    ctx.fillStyle = b.color || '#4a7a9a';
                    ctx.globalAlpha = 0.95;
                }
                // prism shape (triangle)
                ctx.beginPath();
                ctx.moveTo(b.x, b.y + b.h);
                ctx.lineTo(b.x + b.w/2, b.y);
                ctx.lineTo(b.x + b.w, b.y + b.h);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#b0d4f0';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // inner lines
                ctx.strokeStyle = '#8ab8d0';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(b.x + b.w*0.25, b.y + b.h*0.6);
                ctx.lineTo(b.x + b.w*0.75, b.y + b.h*0.6);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(b.x + b.w*0.4, b.y + b.h*0.3);
                ctx.lineTo(b.x + b.w*0.6, b.y + b.h*0.3);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            });

            // ----- draw green birds (with more detail) -----
            greenBirds.forEach(g => {
                if (!g.alive) return;
                ctx.shadowColor = '#00cc66';
                ctx.shadowBlur = 18;
                ctx.fillStyle = '#3cb371';
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // belly
                ctx.fillStyle = '#7ccf8a';
                ctx.beginPath();
                ctx.arc(g.x-4, g.y+4, g.radius*0.55, 0, Math.PI*2);
                ctx.fill();
                // eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(g.x+6, g.y-6, 7, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1a2a1a';
                ctx.beginPath();
                ctx.arc(g.x+9, g.y-8, 3.5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(g.x+11, g.y-11, 1.8, 0, Math.PI*2);
                ctx.fill();
                // angry eyebrow
                ctx.strokeStyle = '#1a2a1a';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(g.x+2, g.y-14);
                ctx.lineTo(g.x+13, g.y-17);
                ctx.stroke();
                // beak
                ctx.fillStyle = '#e67e22';
                ctx.beginPath();
                ctx.moveTo(g.x+13, g.y-2);
                ctx.lineTo(g.x+22, g.y+2);
                ctx.lineTo(g.x+13, g.y+6);
                ctx.fill();
                // top feathers
                ctx.fillStyle = '#2e8b57';
                ctx.beginPath();
                ctx.moveTo(g.x-6, g.y-16);
                ctx.lineTo(g.x, g.y-26);
                ctx.lineTo(g.x+6, g.y-16);
                ctx.fill();
                ctx.fillStyle = '#1f6d3a';
                ctx.beginPath();
                ctx.moveTo(g.x-2, g.y-18);
                ctx.lineTo(g.x+4, g.y-30);
                ctx.lineTo(g.x+10, g.y-18);
                ctx.fill();
            });

            // ----- lasers (explosion effects) -----
            lasers.forEach(l => {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ffaa44';
                ctx.strokeStyle = `rgba(255, 200, 50, ${l.life/15})`;
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(l.x1, l.y1);
                ctx.lineTo(l.x2, l.y2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            // ----- draw angry bird (current) -----
            if (currentBird && !currentBird.dead && !gameWon) {
                const b = currentBird;
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff6633';
                ctx.fillStyle = '#e63946';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // belly
                ctx.fillStyle = '#f2a0a0';
                ctx.beginPath();
                ctx.arc(b.x-5, b.y+5, 12, 0, Math.PI*2);
                ctx.fill();
                // eyes
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(b.x+6, b.y-8, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x-6, b.y-8, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1a1a2c';
                ctx.beginPath();
                ctx.arc(b.x+10, b.y-12, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x-2, b.y-12, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(b.x+12, b.y-16, 2.5, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(b.x, b.y-16, 2.5, 0, Math.PI*2);
                ctx.fill();
                // angry brows
                ctx.strokeStyle = '#1a1a2c';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(b.x-4, b.y-18);
                ctx.lineTo(b.x+8, b.y-24);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(b.x-8, b.y-20);
                ctx.lineTo(b.x+4, b.y-26);
                ctx.stroke();
                // beak
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.moveTo(b.x+12, b.y+2);
                ctx.lineTo(b.x+24, b.y+4);
                ctx.lineTo(b.x+12, b.y+10);
                ctx.fill();
                // feather
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(b.x-10, b.y-18);
                ctx.lineTo(b.x-18, b.y-30);
                ctx.lineTo(b.x-4, b.y-24);
                ctx.fill();
                ctx.fillStyle = '#b52b1a';
                ctx.beginPath();
                ctx.moveTo(b.x+2, b.y-22);
                ctx.lineTo(b.x-2, b.y-36);
                ctx.lineTo(b.x+10, b.y-26);
                ctx.fill();
            }

            // small HUD: green birds left (also shown in ui-bar)
            if (gameWon) {
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(0, 0, W, H);
            }

            update();
            requestAnimationFrame(draw);
        }

        // ----- MOUSE / TOUCH EVENTS -----
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function onPointerDown(e) {
            e.preventDefault();
            if (!currentBird || currentBird.launched || gameWon) return;
            const pos = getPos(e);
            const dx = pos.x - currentBird.x;
            const dy = pos.y - currentBird.y;
            if (Math.hypot(dx, dy) < 50) {
                isDragging = true;
            }
        }

        function onPointerMove(e) {
            e.preventDefault();
            if (!isDragging || !currentBird || currentBird.launched || gameWon) return;
            const pos = getPos(e);
            let dx = pos.x - SLING_X;
            let dy = pos.y - SLING_Y;
            const dist = Math.min(Math.hypot(dx, dy), 120);
            const angle = Math.atan2(dy, dx);
            currentBird.x = SLING_X + Math.cos(angle) * dist;
            currentBird.y = SLING_Y + Math.sin(angle) * dist;
        }

        function onPointerUp(e) {
            e.preventDefault();
            if (!isDragging || !currentBird || currentBird.launched || gameWon) return;
            isDragging = false;
            const dx = SLING_X - currentBird.x;
            const dy = SLING_Y - currentBird.y;
            const power = Math.hypot(dx, dy);
            if (power > 15) {
                currentBird.vx = dx * POWER_MULT;
                currentBird.vy = dy * POWER_MULT;
                currentBird.launched = true;
                updateDebug('🚀 Bird launched!');
            } else {
                spawnBird();
            }
        }

        canvas.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        canvas.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp, { passive: false });

        // ----- RESET -----
        document.getElementById('resetBtn').onclick = () => {
            initLevel();
            document.getElementById('winMessage').style.display = 'none';
            updateDebug('🔄 New siege started.');
        };

        // ----- DEBUG HELPER -----
        function updateDebug(msg) {
            const el = document.getElementById('debug');
            if (el) el.innerHTML = msg;
            console.log(msg);
        }

        // ----- START -----
        initLevel();
        draw();
        updateDebug('🎯 More prisms! Aim carefully.');
    })();
</script>
</body>
</html>
