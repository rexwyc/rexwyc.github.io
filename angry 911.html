<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Boeing 727 - City Siege (HUGE osama on Engine)</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            min-height: 100vh; 
            background: #050505; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        .game-container { 
            background: #111; 
            border-radius: 20px; 
            padding: 20px; 
            border: 1px solid #333; 
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            position: relative;
        }
        canvas { 
            display: block; 
            margin: 0 auto; 
            border-radius: 10px; 
            background-color: #87CEEB;
            cursor: crosshair; 
            touch-action: none; 
        }
        .ui-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
            padding: 5px 20px; 
            color: #00d2ff; 
            gap: 15px;
        }
        button { 
            background: #222; 
            border: 1px solid #00d2ff; 
            color: #00d2ff; 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        button:hover { 
            background: #00d2ff; 
            color: #000; 
        }
        .music-btn {
            background: #222;
            border: 1px solid #ffaa44;
            color: #ffaa44;
        }
        .music-btn:hover {
            background: #ffaa44;
            color: #000;
        }
        .music-btn.playing {
            background: #ffaa44;
            color: #000;
        }
        .debug-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="550"></canvas>
    <div class="ui-bar">
        <div style="font-family: monospace;">FLEET: ∞ | BG: LIGHT BLUE MODE | HUGE osama POWER</div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="musicBtn" class="music-btn">🎵 PLAY MUSIC</button>
            <button id="resetBtn">RELOAD CITY</button>
        </div>
    </div>
</div>
<div id="debug" class="debug-info">Ready. Click PLAY MUSIC</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1000, H = 550;
        
        const GRAVITY = 0.25; 
        const GROUND_Y = H - 40;
        const SLING_X = 130, SLING_Y = 380;
        const POWER_MULT = 0.18;

        let blocks = [], lasers = [], adsUnits = [], currentPlane = null;
        let isDragging = false;
        
        // 加載 osama 圖片
        const putinImg = new Image();
        putinImg.src = 'images/osama.png';
        let putinImageLoaded = false;
        
        putinImg.onload = () => {
            putinImageLoaded = true;
            updateDebug('✓ HUGE osama image loaded!');
        };
        
        putinImg.onerror = () => {
            updateDebug('✗ osama image not found: images/osama.png');
        };
        
        // 背景音樂設置
        let backgroundMusic = null;
        let isMusicPlaying = false;
        
        function updateDebug(msg) {
            const debugDiv = document.getElementById('debug');
            if (debugDiv) {
                debugDiv.innerHTML = msg;
                setTimeout(() => {
                    if (debugDiv.innerHTML === msg) {
                        // Keep last message
                    }
                }, 3000);
            }
            console.log(msg);
        }
        
        // 創建音頻元素並嘗試加載本地文件
        function initMusic() {
            try {
                backgroundMusic = new Audio();
                backgroundMusic.src = 'music/os.mp3';
                backgroundMusic.loop = true;
                backgroundMusic.volume = 0.5;
                backgroundMusic.preload = 'auto';
                
                updateDebug('Loading music/os.mp3...');
                
                // 監聽加載事件
                backgroundMusic.addEventListener('canplaythrough', () => {
                    updateDebug('✓ Music loaded successfully! Ready to play');
                    const musicBtn = document.getElementById('musicBtn');
                    if (!isMusicPlaying) {
                        musicBtn.textContent = '🎵 PLAY MUSIC';
                        musicBtn.disabled = false;
                    }
                });
                
                backgroundMusic.addEventListener('error', (e) => {
                    console.error('Music error:', e);
                    updateDebug('✗ Music file not found: music/os.mp3');
                    const musicBtn = document.getElementById('musicBtn');
                    musicBtn.textContent = '⚠️ FILE NOT FOUND';
                    musicBtn.style.borderColor = '#ff4444';
                    setTimeout(() => {
                        if (!isMusicPlaying) {
                            musicBtn.textContent = '🎵 PLAY MUSIC';
                            musicBtn.style.borderColor = '#ffaa44';
                        }
                    }, 2000);
                });
                
                // 開始加載
                backgroundMusic.load();
                
            } catch(e) {
                console.error("Audio creation error:", e);
                updateDebug('Error creating audio');
            }
        }
        
        // 啟動音樂的函數
        function toggleMusic() {
            if (!backgroundMusic) {
                initMusic();
                setTimeout(() => {
                    if (backgroundMusic) toggleMusic();
                }, 500);
                return;
            }
            
            if (isMusicPlaying) {
                // 暫停音樂
                backgroundMusic.pause();
                isMusicPlaying = false;
                const musicBtn = document.getElementById('musicBtn');
                musicBtn.textContent = '🎵 PLAY MUSIC';
                musicBtn.classList.remove('playing');
                updateDebug('Music paused');
            } else {
                // 播放音樂
                updateDebug('Attempting to play music/os.mp3...');
                const playPromise = backgroundMusic.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isMusicPlaying = true;
                        const musicBtn = document.getElementById('musicBtn');
                        musicBtn.textContent = '🎵 MUSIC ON';
                        musicBtn.classList.add('playing');
                        updateDebug('✓ Music playing!');
                    }).catch(error => {
                        console.error("Playback failed:", error);
                        updateDebug('✗ Playback error: ' + error.message);
                        
                        if (error.name === 'NotAllowedError') {
                            alert('Click the PLAY MUSIC button again.\n\nBrowsers require a direct click to play audio.');
                        } else if (error.name === 'NotSupportedError') {
                            alert('Audio format not supported. Make sure music/os.mp3 is a valid MP3 file.');
                        } else {
                            alert('Cannot play music. Make sure the file exists at: music/os.mp3\n\nError: ' + error.message);
                        }
                        
                        isMusicPlaying = false;
                        const musicBtn = document.getElementById('musicBtn');
                        musicBtn.textContent = '🎵 PLAY MUSIC';
                        musicBtn.classList.remove('playing');
                    });
                }
            }
        }
        
        // 初始化音樂
        initMusic();

        function initLevel() {
            blocks = []; adsUnits = []; lasers = [];
            const towers = [{id: 1, x: 600}, {id: 2, x: 820}];
            towers.forEach(tInfo => {
                for(let i=0; i<7; i++) {
                    blocks.push({
                        towerId: tInfo.id,
                        x: tInfo.x, y: GROUND_Y - (i+1)*65, 
                        w: 90, h: 60, vx: 0, vy: 0, hit: false,
                        windows: Array.from({length: 8}, () => Math.random() > 0.2)
                    });
                }
                adsUnits.push({ 
                    parentTowerId: tInfo.id, x: tInfo.x + 45, y: GROUND_Y - (7 * 65) - 10, 
                    vx: 0, vy: 0, cooldown: 0, destroyed: false 
                });
            });
            spawnPlane();
        }

        function spawnPlane() {
            currentPlane = { x: SLING_X, y: SLING_Y, vx: 0, vy: 0, launched: false, dead: false };
            isDragging = false;
        }

        canvas.onmousedown = (e) => {
            if (currentPlane.launched) return;
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            if (Math.hypot(mx - currentPlane.x, my - currentPlane.y) < 60) isDragging = true;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            let mx = e.clientX - rect.left, my = e.clientY - rect.top;
            const dist = Math.min(Math.hypot(mx - SLING_X, my - SLING_Y), 120);
            const angle = Math.atan2(my - SLING_Y, mx - SLING_X);
            currentPlane.x = SLING_X + Math.cos(angle) * dist;
            currentPlane.y = SLING_Y + Math.sin(angle) * dist;
        };

        window.onmouseup = () => {
            if (!isDragging) return;
            isDragging = false;
            currentPlane.vx = (SLING_X - currentPlane.x) * POWER_MULT;
            currentPlane.vy = (SLING_Y - currentPlane.y) * POWER_MULT;
            currentPlane.launched = true;
            setTimeout(spawnPlane, 3500);
        };

        function update() {
            if (currentPlane.launched && !currentPlane.dead) {
                currentPlane.vy += GRAVITY; currentPlane.x += currentPlane.vx; currentPlane.y += currentPlane.vy;
                if (currentPlane.y > GROUND_Y) currentPlane.dead = true;

                adsUnits.forEach(t => {
                    if (!t.destroyed) {
                        t.cooldown--;
                        if (Math.hypot(currentPlane.x - t.x, currentPlane.y - t.y) < 400 && t.cooldown <= 0) {
                            lasers.push({x1: t.x, y1: t.y, x2: currentPlane.x, y2: currentPlane.y, life: 10});
                            currentPlane.dead = true;
                            t.cooldown = 60;
                        }
                    }
                });
            }

            blocks.forEach(b => {
                if (b.hit) {
                    b.vy += GRAVITY; b.x += b.vx; b.y += b.vy;
                    if (b.y > GROUND_Y - b.h) { b.y = GROUND_Y - b.h; b.vy = 0; b.vx *= 0.4; }
                } else if (currentPlane.launched && !currentPlane.dead) {
                    if (currentPlane.x + 30 > b.x && currentPlane.x - 30 < b.x + b.w &&
                        currentPlane.y + 10 > b.y && currentPlane.y - 10 < b.y + b.h) {
                        blocks.forEach(nb => { if(nb.towerId === b.towerId) nb.hit = true; });
                        adsUnits.forEach(a => { if(a.parentTowerId === b.towerId) a.destroyed = true; });
                        currentPlane.dead = true;
                    }
                }
            });
            lasers = lasers.filter(l => l.life-- > 0);
        }

        function drawPlane(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            // 機身 (fuselage)
            ctx.fillStyle = "#fff"; 
            ctx.beginPath(); 
            ctx.ellipse(0, 0, 38, 8, 0, 0, Math.PI * 2); 
            ctx.fill();
            
            // 主翼 (main wings)
            ctx.fillStyle = "#aaa"; 
            ctx.beginPath(); 
            ctx.moveTo(-5,0); 
            ctx.lineTo(-25, 30); 
            ctx.lineTo(15, 0); 
            ctx.fill();
            ctx.beginPath(); 
            ctx.moveTo(-5,0); 
            ctx.lineTo(-25, -30); 
            ctx.lineTo(15, 0); 
            ctx.fill();
            
            // 駕駛艙窗戶框架 (cockpit frame)
            ctx.fillStyle = "#fff"; 
            ctx.fillRect(-38, -20, 6, 20); 
            ctx.fillRect(-42, -22, 18, 4);
            
            // 藍色矩形引擎 (blue rectangle engine)
            ctx.fillStyle = "#3399ff"; 
            ctx.fillRect(25, -4, 12, 6);
            
            // 在藍色矩形引擎的正上方添加超大的 Putin 圖片
            // 圖片尺寸增大到 55x55，讓它非常顯眼
            if (putinImageLoaded) {
                ctx.drawImage(putinImg, 6, -34, 55, 55);
            } else {
                // 如果圖片還沒加載，顯示一個超大的佔位符
                ctx.fillStyle = "#8B4513";
                ctx.fillRect(6, -34, 55, 55);
                ctx.fillStyle = "#F4C542";
                ctx.font = "bold 28px 'Segoe UI'";
                ctx.fillText("П", 22, -4);
            }
            
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            
            // 繪製半透明地面
            ctx.fillStyle = "rgba(17, 17, 17, 0.8)"; 
            ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
            
            ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(SLING_X, SLING_Y, 50, 0, Math.PI*2); ctx.stroke();
            
            lasers.forEach(l => { ctx.strokeStyle = "red"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2); ctx.stroke(); });

            blocks.forEach(b => {
                ctx.fillStyle = b.hit ? "rgba(34, 34, 34, 0.7)" : "rgba(13, 27, 42, 0.9)";
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.strokeStyle = b.hit ? "#111" : "#00d2ff"; ctx.strokeRect(b.x, b.y, b.w, b.h);
                if (!b.hit) {
                    ctx.fillStyle = "#f1c40f";
                    for(let r=0; r<2; r++) for(let c=0; c<4; c++) if(b.windows[r*4+c]) ctx.fillRect(b.x+15+c*20, b.y+15+r*25, 10, 12);
                }
            });

            adsUnits.forEach(t => { ctx.fillStyle = t.destroyed ? "#333" : "red"; ctx.fillRect(t.x-15, t.y, 30, 15); });

            if (!currentPlane.dead) {
                let angle = currentPlane.launched ? Math.atan2(currentPlane.vy, currentPlane.vx) : Math.atan2(SLING_Y - currentPlane.y, SLING_X - currentPlane.x);
                drawPlane(currentPlane.x, currentPlane.y, angle);
            }
            update();
            requestAnimationFrame(draw);
        }

        // 音樂按鈕事件
        const musicButton = document.getElementById('musicBtn');
        musicButton.onclick = (e) => {
            e.stopPropagation();
            toggleMusic();
        };
        
        // 重置按鈕
        document.getElementById('resetBtn').onclick = () => {
            initLevel();
            updateDebug('City reloaded');
        };
        
        // 初始化遊戲
        initLevel();
        draw();
        
        updateDebug('Game ready! HUGE osama image on engine (55x55) | Music: music/os.mp3');
    })();
</script>
</body>
</html>
