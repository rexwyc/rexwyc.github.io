<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Cubes Quiz</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --text-color: #2b2d42;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #777;
            font-weight: bold;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            font-weight: 500;
        }

        @media (hover: hover) {
            .option-btn:hover:not([disabled]) {
                background: #eef1f6;
                border-color: var(--primary-color);
            }
        }

        .option-btn.correct {
            background: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
        }

        .option-btn.wrong {
            background: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            background: #edf2f7;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
        }

        .next-btn {
            margin-top: 20px;
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .score-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .restart-btn {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <div class="header">
            <span id="question-number">Question 1 of 20</span>
            <span id="score-counter">Score: 0</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <h2 id="question-text">Loading question...</h2>
        <div class="options-container" id="options-container">
            </div>
        <div class="explanation-box" id="explanation-box"></div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="results-screen" class="results-screen">
        <h1>Quiz Completed!</h1>
        <div class="score-text" id="final-score">Your Score: 0 / 20</div>
        <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Which of the following is the correct formula for the sum of cubes: a³ + b³?",
            options: [
                "(a + b)(a² - ab + b²)",
                "(a + b)(a² + ab + b²)",
                "(a - b)(a² + ab + b²)",
                "(a + b)³"
            ],
            answer: 0,
            explain: "The standard algebraic identity for the sum of cubes is a³ + b³ = (a + b)(a² - ab + b²). Remember the sign pattern: SOAP (Same, Opposite, Always Positive)."
        },
        {
            q: "Factor completely: x³ + 8",
            options: [
                "(x + 2)(x² - 4x + 4)",
                "(x + 2)(x² - 2x + 4)",
                "(x - 2)(x² + 2x + 4)",
                "(x + 8)(x² - 8x + 64)"
            ],
            answer: 1,
            explain: "Rewrite 8 as 2³. Here, a = x and b = 2. Using the formula (a+b)(a²-ab+b²), we get (x + 2)(x² - 2x + 4)."
        },
        {
            q: "Factor completely: y³ + 27",
            options: [
                "(y + 3)(y² - 6y + 9)",
                "(y - 3)(y² + 3y + 9)",
                "(y + 3)(y² - 3y + 9)",
                "(y + 27)(y² - y + 1)"
            ],
            answer: 2,
            explain: "27 is 3³. Using a = y and b = 3 in the sum of cubes formula yields (y + 3)(y² - 3y + 9)."
        },
        {
            q: "In the expansion of x³ + 64, what is the 'ab' term in the trinomial part?",
            options: [
                "8x",
                "-4x",
                "4x",
                "-16x"
            ],
            answer: 1,
            explain: "64 is 4³. The formula part is -ab. Here, a = x and b = 4, so the middle term is -(x)(4) = -4x."
        },
        {
            q: "Factor completely: 8x³ + 1",
            options: [
                "(2x + 1)(4x² - 2x + 1)",
                "(2x + 1)(2x² - 2x + 1)",
                "(8x + 1)(64x² - 8x + 1)",
                "(2x - 1)(4x² + 2x + 1)"
            ],
            answer: 0,
            explain: "8x³ is (2x)³ and 1 is 1³. So, a = 2x and b = 1. The factored form is (2x + 1)((2x)² - (2x)(1) + 1²) = (2x + 1)(4x² - 2x + 1)."
        },
        {
            q: "Factor completely: 27m³ + 64n³",
            options: [
                "(3m + 4n)(3m² - 12mn + 4n²)",
                "(3m + 4n)(9m² - 12mn + 16n²)",
                "(3m - 4n)(9m² + 12mn + 16n²)",
                "(9m + 16n)(3m² - 12mn + 4n²)"
            ],
            answer: 1,
            explain: "Rewrite as (3m)³ + (4n)³. Here, a = 3m and b = 4n. Plugging into the formula results in (3m + 4n)(9m² - 12mn + 16n²)."
        },
        {
            q: "What is the missing term? x³ + 125 = (x + 5)(x² - [ ? ] + 25)",
            options: [
                "25x",
                "10x",
                "5x",
                "-5x"
            ],
            answer: 2,
            explain: "Since 125 = 5³, b = 5. The formula contains '-ab' inside the parenthesis. Since the minus sign is already written outside the bracket in the question prompt, the missing value is just ab = 5x."
        },
        {
            q: "Factor completely: 125p³ + 8",
            options: [
                "(5p + 2)(25p² - 10p + 4)",
                "(5p + 2)(5p² - 10p + 2)",
                "(5p - 2)(25p² + 10p + 4)",
                "(25p + 4)(5p² - 10p + 4)"
            ],
            answer: 0,
            explain: "125p³ = (5p)³ and 8 = 2³. Using a = 5p and b = 2 yields (5p + 2)(25p² - 10p + 4)."
        },
        {
            q: "Factor completely: x³y³ + 1",
            options: [
                "(xy + 1)(x²y² - 2xy + 1)",
                "(xy - 1)(x²y² + xy + 1)",
                "(xy + 1)(x²y² - xy + 1)",
                "(xy + 1)(xy - xy + 1)"
            ],
            answer: 2,
            explain: "x³y³ is (xy)³. With a = xy and b = 1, the formula simplifies perfectly to (xy + 1)(x²y² - xy + 1)."
        },
        {
            q: "Factor completely: 2x³ + 54",
            options: [
                "2(x + 3)(x² - 3x + 9)",
                "(2x + 6)(x² - 3x + 9)",
                "2(x + 3)(x² + 3x + 9)",
                "The expression cannot be factored."
            ],
            answer: 0,
            explain: "Always pull out the Greatest Common Factor (GCF) first! Factor out 2 to get 2(x³ + 27). Then factor the sum of cubes inside: 2(x + 3)(x² - 3x + 9)."
        },
        {
            q: "Factor completely: a⁶ + b⁶",
            options: [
                "(a² + b²)(a⁴ - a²b² + b⁴)",
                "(a³ + b³)(a³ - b³)",
                "(a² + b²)(a⁴ + a²b² + b⁴)",
                "(a + b)(a⁵ - b⁵)"
            ],
            answer: 0,
            explain: "Treat this as a sum of cubes by rewriting it as (a²)³ + (b²)³. Here, our terms are a² and b². The result is (a² + b²)((a²)² - (a²)(b²) + (b²)²) = (a² + b²)(a⁴ - a²b² + b⁴)."
        },
        {
            q: "Which mnemonic helps you remember the signs for the sum and difference of cubes?",
            options: [
                "FOIL",
                "PEMDAS",
                "SOAP",
                "SOHCAHTOA"
            ],
            answer: 2,
            explain: "SOAP stands for Same, Opposite, Always Positive. For a³ + b³, the signs are Same (+), Opposite (-), and Always Positive (+)."
        },
        {
            q: "Factor completely: 8x³ + 27y³",
            options: [
                "(2x + 3y)(2x² - 6xy + 3y²)",
                "(2x + 3y)(4x² - 6xy + 9y²)",
                "(2x - 3y)(4x² + 6xy + 9y²)",
                "(4x + 9y)(2x² - 6xy + 3y²)"
            ],
            answer: 1,
            explain: "Rewrite as (2x)³ + (3y)³. Applying the formula gives (2x + 3y)(4x² - 6xy + 9y²). Ensure you square the entire 2x and 3y terms!"
        },
        {
            q: "Can the trinomial part (a² - ab + b²) of a basic sum of cubes be factored further using real numbers?",
            options: [
                "Yes, always.",
                "Yes, but only if a and b are even.",
                "No, it is a prime quadratic expression over real numbers.",
                "Yes, if it is multiplied by 2."
            ],
            answer: 2,
            explain: "The quadratic trinomial factor generated from a sum or difference of cubes calculation cannot be factored further using real numbers."
        },
        {
            q: "Factor completely: x³ + 1000",
            options: [
                "(x + 100)(x² - 100x + 10000)",
                "(x + 10)(x² - 10x + 100)",
                "(x - 10)(x² + 10x + 100)",
                "(x + 10)(x² + 10x + 100)"
            ],
            answer: 1,
            explain: "Since 1000 = 10³, this is a sum of cubes with a = x and b = 10. The layout matches (x + 10)(x² - 10x + 100)."
        },
        {
            q: "Factor completely: 64 + m³",
            options: [
                "(4 + m)(16 - 4m + m²)",
                "(8 + m)(64 - 8m + m²)",
                "(4 - m)(16 + 4m + m²)",
                "(4 + m)(16 + 4m + m²)"
            ],
            answer: 0,
            explain: "64 is 4³. Even if the number is first, the formula functions exactly the same way: (4 + m)(4² - 4m + m²) = (4 + m)(16 - 4m + m²)."
        },
        {
            q: "Factor completely: 3x⁴ + 24x",
            options: [
                "3x(x + 2)(x² - 2x + 4)",
                "3(x² + 2)(x² - 2x + 4)",
                "3x(x - 2)(x² + 2x + 4)",
                "3x(x + 2)(x² - 4x + 4)"
            ],
            answer: 0,
            explain: "First, pull out the GCF which is 3x. This leaves 3x(x³ + 8). Factoring the sum of cubes inside gives 3x(x + 2)(x² - 2x + 4)."
        },
        {
            q: "Find the value of (x+y)(x² - xy + y²) if x = 3 and y = 2.",
            options: [
                "13",
                "35",
                "9",
                "25"
            ],
            answer: 1,
            explain: "The given expression is the factored form of x³ + y³. Substituting the values directly: 3³ + 2³ = 27 + 8 = 35."
        },
        {
            q: "Factor completely: x³ + 1/8",
            options: [
                "(x + 1/2)(x² - 1/2x + 1/4)",
                "(x + 1/2)(x² - 1/4x + 1/8)",
                "(x - 1/2)(x² + 1/2x + 1/4)",
                "(x + 1/4)(x² - 1/2x + 1/2)"
            ],
            answer: 0,
            explain: "1/8 is equal to (1/2)³. Using a = x and b = 1/2, the expression factors into (x + 1/2)(x² - 1/2x + (1/2)²) = (x + 1/2)(x² - 1/2x + 1/4)."
        },
        {
            q: "Factor completely: x⁹ + 1",
            options: [
                "(x³ + 1)(x⁶ - x³ + 1)",
                "(x³ + 1)(x³ - x + 1)",
                "(x³ + 1)(x⁶ - 2x³ + 1)",
                "(x⁴ + 1)(x⁵ - x + 1)"
            ],
            answer: 0,
            explain: "Rewrite x⁹ + 1 as (x³)³ + 1³. Treating a = x³ and b = 1 yields the structure: (x³ + 1)((x³)² - (x³)(1) + 1²) = (x³ + 1)(x⁶ - x³ + 1). Note: The first term can technically factor further, but among the choices given, this representation is correct."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const explanationBox = document.getElementById("explanation-box");
    const nextBtn = document.getElementById("next-btn");
    const questionNumber = document.getElementById("question-number");
    const scoreCounter = document.getElementById("score-counter");
    const progressFill = document.getElementById("progress-fill");
    const quizScreen = document.getElementById("quiz-screen");
    const resultsScreen = document.getElementById("results-screen");
    const finalScore = document.getElementById("final-score");

    function loadQuestion() {
        explanationBox.style.display = "none";
        nextBtn.style.display = "none";
        
        let currentQuestion = questions[currentQuestionIndex];
        questionText.innerText = currentQuestion.q;
        questionNumber.innerText = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
        scoreCounter.innerText = `Score: ${score}`;
        
        // Update Progress Bar
        let progressPercent = ((currentQuestionIndex) / questions.length) * 100;
        progressFill.style.width = `${progressPercent}%`;

        optionsContainer.innerHTML = "";
        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.classList.add("option-btn");
            button.innerText = option;
            button.onclick = () => checkAnswer(index, button);
            optionsContainer.appendChild(button);
        });
    }

    function checkAnswer(selectedIndex, selectedButton) {
        const currentQuestion = questions[currentQuestionIndex];
        const allButtons = optionsContainer.querySelectorAll(".option-btn");

        // Disable all buttons after choice
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuestion.answer) {
            selectedButton.classList.add("correct");
            score++;
            scoreCounter.innerText = `Score: ${score}`;
        } else {
            selectedButton.classList.add("wrong");
            // Highlight the correct answer
            allButtons[currentQuestion.answer].classList.add("correct");
        }

        // Show Explanation and Next Button
        explanationBox.innerText = currentQuestion.explain;
        explanationBox.style.display = "block";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        progressFill.style.width = "100%";
        quizScreen.style.display = "none";
        resultsScreen.style.display = "block";
        finalScore.innerText = `Your Score: ${score} / ${questions.length}`;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        resultsScreen.style.display = "none";
        quizScreen.style.display = "block";
        loadQuestion();
    }

    // Initialize Quiz
    loadQuestion();
</script>

</body>
</html>
