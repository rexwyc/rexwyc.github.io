<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master: Rates & Proportions</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --primary-dark: #3b5a84;
            --secondary: #13c2c2;
            --background: #f0f2f5;
            --card-bg: #ffffff;
            --text: #2d3748;
            --success: #52c41a;
            --error: #ff4d4f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            color: #595959;
            background: #fafafa;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .question-box {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 70px;
            display: flex;
            align-items: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background: #fff;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
            color: var(--text);
            outline: none;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn.correct {
            background-color: #f6ffed;
            border-color: var(--success);
            color: #389e0d;
        }

        .btn.wrong {
            background-color: #fff2f0;
            border-color: var(--error);
            color: #cf1322;
        }

        .feedback-card {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .feedback-title {
            font-weight: bold;
            color: #0050b3;
            margin-bottom: 5px;
        }

        .explanation {
            font-size: 0.9rem;
            color: #262626;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            display: none;
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.2);
        }

        .action-btn:hover {
            background: var(--primary-dark);
        }

        /* Phone friendly touches */
        @media (max-width: 400px) {
            .game-container {
                padding: 15px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .question-box {
                font-size: 1rem;
            }
            .btn {
                padding: 12px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<div class="game-container">
    <header>
        <h1>Math Master</h1>
        <div class="stats-bar">
            <span id="score-display">Score: 0</span>
            <span id="streak-display">Streak: 0🔥</span>
            <span id="progress-display">Q: 1/50</span>
        </div>
    </header>

    <main>
        <div class="question-box" id="question">Loading question...</div>
        
        <div class="options-grid" id="options">
            </div>

        <div class="feedback-card" id="feedback">
            <div class="feedback-title" id="feedback-status">Correct!</div>
            <div class="explanation" id="explanation">Step-by-step explanation goes here.</div>
        </div>

        <button class="action-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
    </main>
</div>

<script>
    // 50 uniquely generated questions balancing Ratios, Rates, Direct/Inverse Variations, Maps & Scales
    const questionDatabase = [
        {
            q: "A map has a scale of 1:50,000. If two parks are 6 cm apart on the map, what is the actual distance in kilometers?",

            exp: "Step 1: Multiply map distance by scale: 6 cm × 50,000 = 300,000 cm.\nStep 2: Convert to meters: 300,000 ÷ 100 = 3,000 m.\nStep 3: Convert to kilometers: 3,000 ÷ 1,000 = 3 km."
        },
        {
            q: "If y varies directly with x, and y = 15 when x = 3, find y when x = 7.",

        },
        {
            q: "On a map with scale 1 : 200,000, two cities are 8 cm apart. What is their actual distance in km?",
            o: ["16 km", "1.6 km", "160 km", "1,600 km"],

            exp: "Step 1: Map calculation: 8 × 200,000 = 1,600,000 cm.\nStep 2: Convert to meters: 1,600,000 ÷ 100 = 16,000 m.\nStep 3: Convert to km: 16,000 ÷ 1,000 = 16 km."
        },
        {
            q: "If y varies directly with the square of x, and y = 12 when x = 2, find y when x = 4.",
            o: ["48", "24", "96", "36"],
            a: 0,
            exp: "Step 1: Formula: y = k * x².\nStep 2: 12 = k * 2² -> 12 = 4k -> k = 3.\nStep 3: For x = 4: y = 3 * 4² = 3 * 16 = 48."
        },
        {
            q: "If 10 workers can complete a job in 12 days, how many days will it take 15 workers to do the same job?",
            o: ["8 days", "10 days", "6 days", "18 days"],
            a: 0,
            exp: "Step 1: Workload is constant (inverse variation): 10 × 12 = 120 worker-days.\nStep 2: Solve for 15 workers: 15 × Days = 120.\nStep 3: Days = 120 ÷ 15 = 8 days."
        },
        {
            q: "Convert the speed of 90 km/h into meters per second (m/s).",
            o: ["25 m/s", "30 m/s", "20 m/s", "15 m/s"],
            a: 0,
            exp: "Step 1: Convert km to m: 90 km = 90,000 m.\nStep 2: Convert hours to seconds: 1 hour = 3,600 seconds.\nStep 3: Calculate: 90,000 ÷ 3,600 = 25 m/s."
        },
        {
            q: "A map has a scale of 2 cm : 5 km. If the actual distance is 25 km, how far apart are they on the map?",
            o: ["10 cm", "5 cm", "12.5 cm", "20 cm"],
            a: 0,
            exp: "Step 1: Set up the proportion: (Map cm) / (Actual km) = 2/5.\nStep 2: 2/5 = x/25.\nStep 3: Cross multiply: 5x = 50 -> x = 10 cm."
        },
        {
            q: "If a pool empties at a rate of 150 liters per minute, how long will it take to empty a 9,000-liter pool?",
            o: ["60 minutes", "45 minutes", "75 minutes", "90 minutes"],
            a: 0,
            exp: "Step 1: Time = Total Volume ÷ Flow Rate.\nStep 2: Time = 9,000 ÷ 150 = 60 minutes."
        },
        {
            q: "The ratio of red marbles to blue marbles is 3 : 5. If there are 40 blue marbles, how many red marbles are there?",

        },
        {
            q: "A gear system has inverse variation between gear teeth and rotation speed. Gear A (20 teeth) spins at 120 RPM. How fast does Gear B (30 teeth) spin?",
            o: ["80 RPM", "180 RPM", "60 RPM", "100 RPM"],
            a: 0,
            exp: "Step 1: Since it's inverse, (Teeth × RPM) is constant: 20 × 120 = 2400.\nStep 2: Set up equation for B: 30 × RPM = 2400.\nStep 3: Solve: RPM = 2400 ÷ 30 = 80 RPM."
        },
        {
            q: "If 3 liters of paint cover 24 square meters, how many liters are needed for 64 square meters?",
            o: ["8 liters", "6 liters", "10 liters", "12 liters"],
            a: 0,
            exp: "Step 1: Find coverage per liter: 24 ÷ 3 = 8 sq meters per liter.\nStep 2: Divide total target area by coverage rate: 64 ÷ 8 = 8 liters."
        },
        {
            q: "A scale on a model airplane is 1 : 48. If the actual wing span is 12 meters, how long is the model wing span in cm?",
            o: ["25 cm", "50 cm", "2.5 cm", "4.8 cm"],
            a: 0,
            exp: "Step 1: Convert actual size to cm: 12 m = 1,200 cm.\nStep 2: Scale down: 1,200 ÷ 48 = 25 cm."
        },
        {
            q: "If y is directly proportional to x, and y = 28 when x = 4, find x when y = 49.",
            o: ["7", "6", "8", "9"],
            a: 0,
            exp: "Step 1: Formula y = kx. Find k: 28 = k(4) -> k = 7.\nStep 2: Put in new y: 49 = 7x.\nStep 3: Solve: x = 49 ÷ 7 = 7."
        },
        {
            q: "The scale of a floor plan is 1 : 100. If an office room is drawn as 5 cm by 4 cm, what is its actual area in square meters?",
            o: ["20 sq m", "200 sq m", "2 sq m", "2,000 sq m"],

            exp: "Step 1: Convert map lengths to actual lengths: 5 cm × 100 = 500 cm = 5 m. 4 cm × 100 = 400 cm = 4 m.\nStep 2: Calculate actual area: 5 m × 4 m = 20 sq m."

        {
            q: "If a runner covers 400 meters in 80 seconds, what is their average speed?",
            o: ["5 m/s", "8 m/s", "4 m/s", "6 m/s"],
            a: 0,
            exp: "Step 1: Speed = Distance ÷ Time.\nStep 2: Speed = 400 m ÷ 80 s = 5 m/s."
        },
        {
            q: "Three people split a prize in the ratio 2 : 3 : 5. If the total prize is $1,000, how much does the person with the middle share get?",
            o: ["$300", "$200", "$500", "$150"],
            a: 0,
            exp: "Step 1: Add total ratio parts: 2 + 3 + 5 = 10 parts.\nStep 2: Find value of one part: $1,000 ÷ 10 = $100.\nStep 3: Calculate middle share (3 parts): 3 × $100 = $300."
        },
        {
            q: "In a science lab, pressure varies inversely with volume. If pressure is 2 atm when volume is 6L, what is pressure when volume is 3L?",
            o: ["4 atm", "1 atm", "3 atm", "12 atm"],
            a: 0,
            exp: "Step 1: Inverse relation: P × V = k.\nStep 2: Find constant: 2 × 6 = 12.\nStep 3: Solve for new pressure: P × 3 = 12 -> P = 4 atm."
        },
        {
            q: "A map uses a scale of 1 inch : 12 miles. How many inches represents 54 miles?",
            o: ["4.5 inches", "5 inches", "4.2 inches", "6 inches"],

            exp: "Step 1: Set up proportion: 1 / 12 = x / 54.\nStep 2: Solve: 12x = 54.\nStep 3: x = 54 ÷ 12 = 4.5 inches."
        },
        {
            q: "If 12 yards of fabric cost $96, how much would 5 yards of the same fabric cost?",
            o: ["$40", "$45", "$35", "$50"],
            a: 0,
            exp: "Step 1: Find price per yard: $96 ÷ 12 = $8 per yard.\nStep 2: Multiply by target yardage: $8 × 5 = $40."
        },
        {
            q: "Two cities are 250 km apart. On a map they are 5 cm apart. What is the scale ratio?",
            o: ["1 : 5,000,000", "1 : 50,000", "1 : 500,000", "1 : 25,000"],
            a: 0,
            exp: "Step 1: Convert 250 km to cm: 250 km = 250,000 m = 25,000,000 cm.\nStep 2: Write scale: 5 : 25,000,000.\nStep 3: Simplify: 1 : 5,000,000."
        },
        {
            q: "If y varies inversely with x, and y = 12 when x = 3, find y when x = 9.",
            o: ["4", "36", "6", "1.5"],
            a: 0,
            exp: "Step 1: Inverse variation: y × x = k.\nStep 2: Find constant k: 12 × 3 = 36.\nStep 3: Solve for new y: y × 9 = 36 -> y = 4."
        },
        {
            q: "A faucet drips 15 ml of water per minute. How much water is wasted in 2 hours?",
            o: ["1.8 liters", "1.5 liters", "180 ml", "30 ml"],
            a: 0,
            exp: "Step 1: Find total minutes in 2 hours: 2 × 60 = 120 minutes.\nStep 2: Calculate ml wasted: 15 ml × 120 = 1,800 ml.\nStep 3: Convert ml to liters: 1,800 ml ÷ 1,000 = 1.8 liters."
        },
        {
            q: "The ratio of boys to girls in a club is 4 : 7. If there are 28 girls, what is the total number of members?",
            o: ["44", "16", "35", "48"],
            a: 0,
            exp: "Step 1: Find number of boys (B): B / 28 = 4 / 7 -> B = (4 × 28) ÷ 7 = 16.\nStep 2: Add boys and girls: 16 boys + 28 girls = 44 members."
        },
        {
            q: "If a car uses 6 liters of fuel for every 100 km, how much fuel does it need for 350 km?",
            o: ["21 liters", "18 liters", "24 liters", "15 liters"],

        {
            q: "If a typist can type 200 words in 4 minutes, how many words can they type in 15 minutes?",
            o: ["750 words", "600 words", "800 words", "700 words"],

        },
        {
            q: "A machine can seal 80 cans in 20 seconds. How many cans can it seal in 1 minute?",
            o: ["240 cans", "160 cans", "320 cans", "200 cans"],
            a: 0,

        },
        {
            q: "The ratio of angles in a triangle is 1 : 2 : 3. What is the measure of the largest angle? (Sum of angles = 180 degrees)",

            a: 0,
            exp: "Step 1: Add ratio parts: 1 + 2 + 3 = 6 parts.\nStep 2: Divide 180 by 6 to find 1 part: 180° ÷ 6 = 30°.\nStep 3: Largest angle is 3 parts: 3 × 30° = 90°."
        },

            a: 0,
            exp: "Step 1: Calculate map distance: 7.5 × 1,000,000 = 7,500,000 cm.\nStep 2: Convert to meters: 7,500,000 ÷ 100 = 75,000 m.\nStep 3: Convert to kilometers: 75,000 ÷ 1,000 = 75 km."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let streak = 0;
    let totalAnswered = 0;
    let isAnswered = false;
    let currentOptions = [];

    // Helper to shuffle options so key 'A' is not always index 0
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function loadQuestion() {
        isAnswered = false;
        document.getElementById("feedback").style.display = "none";
        document.getElementById("next-btn").style.display = "none";

        // INFINITE LOOP logic: When we reach 50, cycle back smoothly
        const qIndex = currentQuestionIndex % questionDatabase.length;
        const currentData = questionDatabase[qIndex];

        // Update progress counters (loops infinitely, so counts total answered)
        document.getElementById("progress-display").innerText = `Q: ${(totalAnswered + 1)}`;

        // Set up the question text
        document.getElementById("question").innerText = currentData.q;

        // Clone and shuffle options safely
        currentOptions = currentData.o.map((option, idx) => {
            return { text: option, isCorrect: idx === currentData.a };
        });
        shuffleArray(currentOptions);

        // Display options
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        currentOptions.forEach((option, idx) => {
            const button = document.createElement("button");
            button.className = "btn";
            button.innerText = option.text;
            button.onclick = () => selectOption(idx);
            optionsDiv.appendChild(button);
        });
    }

    function selectOption(selectedIndex) {
        if (isAnswered) return;
        isAnswered = true;

        const qIndex = currentQuestionIndex % questionDatabase.length;
        const currentData = questionDatabase[qIndex];
        const optionsDiv = document.getElementById("options");
        const buttons = optionsDiv.getElementsByClassName("btn");

        const selectedOption = currentOptions[selectedIndex];
        const feedbackCard = document.getElementById("feedback");
        const feedbackStatus = document.getElementById("feedback-status");
        const explanationText = document.getElementById("explanation");

        totalAnswered++;

        if (selectedOption.isCorrect) {
            buttons[selectedIndex].classList.add("correct");
            score += 10;
            streak++;
            feedbackStatus.innerText = "Correct! 🎉";
            feedbackStatus.style.color = "#389e0d";
            feedbackCard.style.backgroundColor = "#f6ffed";
            feedbackCard.style.borderColor = "#b7eb8f";
        } else {
            buttons[selectedIndex].classList.add("wrong");
            // Highlight the correct answer for clarity
            for (let i = 0; i < currentOptions.length; i++) {
                if (currentOptions[i].isCorrect) {
                    buttons[i].classList.add("correct");
                }
            }
            streak = 0;
            feedbackStatus.innerText = "Incorrect 💡";
            feedbackStatus.style.color = "#cf1322";
            feedbackCard.style.backgroundColor = "#fff2f0";
            feedbackCard.style.borderColor = "#ffccc7";
        }

        // Show Explanation
        explanationText.innerText = currentData.exp;
        feedbackCard.style.display = "block";

        // Update HUD
        document.getElementById("score-display").innerText = `Score: ${score}`;
        document.getElementById("streak-display").innerText = `Streak: ${streak}🔥`;

        // Show next button
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion();
    }

    // Initialize the Game
    window.onload = function() {
        // Randomize the first start index of 50 questions
        currentQuestionIndex = Math.floor(Math.random() * questionDatabase.length);
        loadQuestion();
    };
</script>
</body>
</html>
