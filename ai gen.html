<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML AI Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #6366f1;
            --border-color: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #4f46e5;
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        .output-box {
            margin-top: 20px;
            padding: 16px;
            background: #0f172a;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            min-height: 100px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.5;
        }

        .loading {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Text Generator</h1>
    
    <!-- API Key Input Field -->
    <div class="form-group">
        <label prejudices for="apiKey">Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
    </div>

    <!-- Prompt Input Field -->
    <div class="form-group">
        <label for="prompt">What do you want to generate?</label>
        <textarea id="prompt" rows="4" placeholder="Write a poem about coding..."></textarea>
    </div>

    <!-- Action Button -->
    <button id="generateBtn" onclick="generateText()">Generate Response</button>

    <!-- Visual Output Area -->
    <div class="output-box" id="output">Your AI generated content will appear here...</div>
</div>

<script>
    async function generateText() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('prompt').value.trim();
        const outputBox = document.getElementById('output');
        const generateBtn = document.getElementById('generateBtn');

        // Basic frontend verification
        if (!apiKey) {
            alert('Please enter your Gemini API key.');
            return;
        }
        if (!prompt) {
            alert('Please enter a prompt.');
            return;
        }

        // Set layout to loading state
        outputBox.innerHTML = '<span class="loading">Thinking...</span>';
        generateBtn.disabled = true;

        try {
            // Using Google's Gemini 2.5 Flash endpoint as an example
            const response = await fetch(`https://googleapis.com{apiKey}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            });

            const data = await response.json();

            // Extract text from the nested JSON object structure returned by the API
            if (response.ok && data.candidates && data.candidates[0].content.parts[0].text) {
                outputBox.textContent = data.candidates[0].content.parts[0].text;
            } else {
                // Display error details returned by API
                outputBox.textContent = `API Error: ${data.error ? data.error.message : 'Unknown response structure.'}`;
            }

        } catch (error) {
            outputBox.textContent = `Network Error: ${error.message}`;
        } finally {
            // Reset layout button state
            generateBtn.disabled = false;
        }
    }
</script>

</body>
</html>
