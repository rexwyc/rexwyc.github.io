        .clues-box {
            background-color: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #007bff;
        }

            margin-bottom: 10px;
            font-size: 16px;
            color: #0056b3;
        }

        .clue-item {
            margin-bottom: 8px;
            font-size: 15px;
            line-height: 1.5;
        }

        .clue-item:last-child {
            margin-bottom: 0;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: #ffffff;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .btn:hover {
                background-color: #f8f9fa;
                border-color: #ced4da;
            }
        }

        .btn.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
            font-weight: bold;
        }

        .btn.wrong {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .explanation-box {
            margin-top: 20px;
            padding: 16px;
            background-color: #e2f0fe;
            border-radius: 12px;
            border-left: 5px solid #17a2b8;
            display: none;
        }

        .explanation-title {
            font-weight: bold;
            color: #0c5460;
            margin-bottom: 6px;
            font-size: 16px;
        }

        .explanation-text {
            font-size: 14px;
            line-height: 1.5;
            color: #114e59;
        }

        .next-btn {
            display: none;
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.15);
        }

        .next-btn:active {
            background-color: #0056b3;
        }

        .results-screen {
            text-align: center;
            display: none;
            padding: 20px 0;
        }

        .results-screen h2 {
            margin-bottom: 12px;
            color: #28a745;
            font-size: 24px;
        }
    </style>
</head>

</div>

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
        // Shuffle the full array of 200 items each time the quiz starts to keep it fresh
        countryData.sort(() => 0.5 - Math.random());
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById("results-screen").style.display = "none";
        document.getElementById("quiz-screen").style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        document.getElementById("next-btn").style.display = "none";
        document.getElementById("explanation-box").style.display = "none";

        const currentData = countryData[currentQuestionIndex];
        
        // Update progress counter dynamically
        document.getElementById("progress").innerText = `Question ${currentQuestionIndex + 1} of ${countryData.length}`;

        // Populate the clue list container
        const cluesContainer = document.getElementById("clues");
        cluesContainer.innerHTML = "";
        currentData.clues.forEach(clue => {
            const p = document.createElement("p");
            p.className = "clue-item";
            p.innerText = "• " + clue;
            cluesContainer.appendChild(p);
        });

        // Set up multiple choice list
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";

        const choices = generateChoices(currentData.name);
        
        choices.forEach(choice => {
            const button = document.createElement("button");
            button.className = "btn";
            button.innerText = choice;
            button.onclick = () => checkAnswer(button, choice, currentData.name, currentData.explanation);
            optionsContainer.appendChild(button);
        });
    }

    function generateChoices(correctAnswer) {
        // Collect all potential country names that are not the correct answer
        let wrongChoices = countryData
            .map(c => c.name)
            .filter(name => name !== correctAnswer);
        
        // Remove duplicate country names in case the data set has repeats
        wrongChoices = [...new Set(wrongChoices)];
        
        // Shuffle wrong options randomly and pick the first 3
        wrongChoices.sort(() => 0.5 - Math.random());
        let selectedChoices = wrongChoices.slice(0, 3);
        
        // Mix the correct answer back into the chosen list and shuffle again
        selectedChoices.push(correctAnswer);
        selectedChoices.sort(() => 0.5 - Math.random());
        
        return selectedChoices;
    }

    function checkAnswer(selectedButton, chosenAnswer, correctAnswer, explanation) {
        if (answered) return; // Ignore input if option was already chosen
        answered = true;

        const buttons = document.getElementById("options").getElementsByClassName("btn");
        
        if (chosenAnswer === correctAnswer) {
            selectedButton.classList.add("correct");
            document.getElementById("explanation-title").innerText = "Correct! 🎉";
            score++;
        } else {
            selectedButton.classList.add("wrong");
            document.getElementById("explanation-title").innerText = "Incorrect ❌";
            
            // Highlight the proper correct button choice to show user the answer
            for (let btn of buttons) {
                if (btn.innerText === correctAnswer) {
                    btn.classList.add("correct");
                }
            }
        }

        // Show explanation text section
        document.getElementById("explanation-text").innerText = explanation;
        document.getElementById("explanation-box").style.display = "block";
        
        // Expose Next button to advance the quiz
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < countryData.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("results-screen").style.display = "block";
        document.getElementById("score-text").innerText = `You scored ${score} out of ${countryData.length}!`;
    }

    function restartQuiz() {
        startQuiz();
    }

    // Auto boot the application on load
    window.onload = startQuiz;
</script>
