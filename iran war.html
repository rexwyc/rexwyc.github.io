<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Shield: Direct Deployment</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #05080a; font-family: 'Segoe UI', sans-serif; color: #00ff00; }
        canvas { display: block; background: #0a0e14; cursor: crosshair; }
        #sidebar {
            position: absolute; left: 0; top: 0; width: 300px; height: 100%;
            background: rgba(10, 20, 25, 0.95); border-right: 2px solid #27ae60;
            overflow-y: auto; padding: 20px; box-sizing: border-box; z-index: 100;
        }
        #hud {
            position: absolute; top: 0; left: 300px; right: 0; padding: 20px;
            background: rgba(0, 0, 0, 0.85); border-bottom: 2px solid #27ae60; display: flex; justify-content: space-between; z-index: 10;
        }
        .btn {
            width: 100%; background: #1c2833; border: 1px solid #27ae60; color: #2ecc71;
            padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: left; font-size: 11px; border-radius: 4px;
        }
        .btn:hover:not(:disabled) { background: #27ae60; color: #fff; }
        .btn.active { background: #f1c40f; color: #000; border-color: #fff; font-weight: bold; }
        .section-title { font-weight: bold; color: #f1c40f; margin: 15px 0 10px 0; border-bottom: 1px solid #f1c40f; text-transform: uppercase; }
        #timer { font-size: 30px; color: #f1c40f; font-weight: bold; text-shadow: 0 0 15px #f1c40f; }
        #hint { position: absolute; bottom: 20px; left: 320px; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="font-size: 18px; font-weight: bold; color: #fff;">SUPREME HQ: IRAN 🇮🇷</div>
    <div class="section-title">Missile Research (20)</div>
    <div id="missile-menu"></div>
    <div class="section-title">Base Upgrades (20)</div>
    <div id="upgrade-menu"></div>
</div>

<div id="hud">
    <div>FUNDS: <span style="color:#f1c40f">$<span id="money">101000</span></span> | TECH: <span id="m-name" style="color:#fff">Sayyad-1</span></div>
    <div id="timer">PREPARING: 30s</div>
    <div>INTEGRITY: <span id="health" style="color:#e74c3c; font-weight:bold;">100</span>%</div>
</div>

<div id="hint">Click anywhere on the battlefield to deploy Bavar-373 ($300 per unit)</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const audio = new (window.AudioContext || window.webkitAudioContext)();

let money = 101000, health = 100, level = 1;
let prepTime = 30, warStarted = false;
let towers = [], enemies = [], missiles = [];

// --- DATA ---
const MISSILE_NAMES = ["Sayyad", "Mersad", "Raad", "Ya-Zahra", "Herz", "Talash", "Khordad", "Bavar", "Arman", "Fattah"];
const MISSILE_DB = Array.from({length: 20}, (_, i) => ({
    name: MISSILE_NAMES[Math.floor(i/2)] + "-" + (i + 1),
    dmg: 110 + (i * 160), speed: 13 + (i * 2), cost: i === 0 ? 0 : Math.floor(Math.pow(i, 2.7) * 250), tier: i
}));
let activeM = 0;

const UPGRADES = Array.from({length: 20}, (_, i) => ({
    name: ["High-Range Radar", "Auto-Reloader", "Steel Fortress", "Petro Revenue", "AI Tracking"][i%5] + " V" + (Math.floor(i/5)+1),
    cost: Math.floor(Math.pow(i+1, 2.4) * 200),
    effect: (i % 5 === 0) ? () => towers.forEach(t => t.range += 60) : 
            (i % 5 === 1) ? () => towers.forEach(t => t.reload -= 10) : 
            (i % 5 === 2) ? () => health = Math.min(100, health + 20) : 
            (i % 5 === 3) ? () => { money += 20000; } : 
                            () => towers.forEach(t => t.dmgMult += 0.4)
}));

// --- TIMER ---
const timerInterval = setInterval(() => {
    if (prepTime > 0) {
        prepTime--;
        document.getElementById('timer').innerText = `PREPARING: ${prepTime}s`;
    } else {
        warStarted = true;
        document.getElementById('timer').innerText = "WAR ACTIVE!";
        document.getElementById('timer').style.color = "#ff3333";
        clearInterval(timerInterval);
    }
}, 1000);

// --- CLICK TO DEPLOY ---
canvas.onclick = (e) => {
    if (e.clientX > 300 && money >= 300) {
        if(audio.state === 'suspended') audio.resume();
        towers.push(new Tower(e.clientX, e.clientY));
        money -= 300; // Deduct money on each click
        sfx(200, 0.1);
    }
};

// --- DRAWING ---
function sfx(f, d) {
    try { const o = audio.createOscillator(); const g = audio.createGain(); o.frequency.value = f; g.gain.value = 0.05; o.connect(g); g.connect(audio.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d); o.stop(audio.currentTime + d); } catch(e) {}
}

function drawUnit(x, y, tier) {
    ctx.save(); ctx.translate(x, y);
    if (tier < 7) { 
        ctx.fillStyle = "#4b5320"; ctx.fillRect(-15, -5, 30, 12);
        ctx.fillStyle = "#111"; ctx.fillRect(-12, 6, 8, 4); ctx.fillRect(4, 6, 8, 4);
    } else if (tier < 14) { 
        ctx.fillStyle = "#3e4e33"; ctx.fillRect(-30, -8, 60, 16);
        ctx.fillStyle = "#1a2416"; ctx.fillRect(-20, -20, 35, 12);
    } else { 
        ctx.fillStyle = "#1a1f16"; ctx.fillRect(-45, -10, 90, 25);
        ctx.fillStyle = "#0d140a"; ctx.fillRect(-35, -35, 50, 25);
        ctx.strokeStyle = "#00ff00"; ctx.strokeRect(-35, -35, 50, 25);
    }
    ctx.restore();
}

function drawEnemy(x, y, faction) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = faction === 'us' ? "#7f8c8d" : "#34495e";
    ctx.beginPath(); ctx.moveTo(35, 0); ctx.lineTo(-20, -12); ctx.lineTo(-15, 0); ctx.lineTo(-20, 12); ctx.fill();
    ctx.fillStyle = "orange"; ctx.fillRect(-30, -4, 10, 8);
    ctx.fillStyle="white"; ctx.font="10px Arial"; ctx.fillText(faction==='us'?'🇺🇸':'🇮🇱', -10, 4);
    ctx.restore();
}

class Tower {
    constructor(x,y) { this.x=x; this.y=y; this.range=420; this.timer=0; this.reload=80; this.dmgMult=1; this.tier = activeM; }
    update() {
        if(this.timer > 0) this.timer--;
        if(!warStarted) return;
        let target = enemies.find(e => Math.hypot(e.x-this.x, e.y-this.y) < this.range);
        if(target && this.timer <= 0) {
            let m = MISSILE_DB[activeM];
            missiles.push({x:this.x, y:this.y-25, t:target, s:m.speed, d:m.dmg*this.dmgMult, tier: m.tier});
            this.timer = Math.max(4, this.reload);
        }
    }
}

function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    if(warStarted && Math.random() < 0.015 + (level * 0.007)) enemies.push({
        x: 300, y: 150 + Math.random()*(canvas.height-300), hp: 200 + (level*200), speed: 4 + (level*0.4), faction: Math.random()>0.5?'us':'is'
    });

    towers.forEach(t => { t.update(); drawUnit(t.x, t.y, t.tier); });
    enemies.forEach((e,i) => {
        e.x += e.speed; drawEnemy(e.x, e.y, e.faction);
        if(e.x > canvas.width) { health -= 1; enemies.splice(i,1); sfx(60, 0.4); }
        if(e.hp <= 0) { money += 400; level += 0.07; enemies.splice(i,1); }
    });

    missiles.forEach((m,i) => {
        let a = Math.atan2(m.t.y-m.y, m.t.x-m.x);
        m.x += Math.cos(a)*m.s; m.y += Math.sin(a)*m.s;
        ctx.fillStyle = m.tier > 12 ? "#00ffff" : "#f1c40f";
        ctx.beginPath(); ctx.arc(m.x,m.y,4,0,7); ctx.fill();
        if(Math.hypot(m.t.x-m.x, m.t.y-m.y) < 20) { m.t.hp -= m.d; missiles.splice(i,1); }
    });

    document.getElementById('money').innerText = Math.floor(money);
    document.getElementById('health').innerText = Math.max(0, health);
    if(health > 0) requestAnimationFrame(loop);
    else { ctx.fillStyle="red"; ctx.font="60px Courier"; ctx.textAlign="center"; ctx.fillText("AIRSPACE COMPROMISED", canvas.width/2+150, canvas.height/2); }
}

// Menu Init
const mMenu = document.getElementById('missile-menu');
MISSILE_DB.forEach((m, i) => {
    const b = document.createElement('button'); b.className = 'btn'; if(i===0) b.classList.add('active');
    b.innerHTML = `<strong>${m.name}</strong><br>ATK: ${m.dmg} | Cost: $${m.cost}`;
    b.onclick = () => { if(money>=m.cost && i!==activeM){ money-=m.cost; activeM=i; document.getElementById('m-name').innerText=m.name; document.querySelectorAll('#missile-menu .btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); } };
    mMenu.appendChild(b);
});

const uMenu = document.getElementById('upgrade-menu');
UPGRADES.forEach((u, i) => {
    const b = document.createElement('button'); b.className = 'btn'; b.innerHTML = u.name + " ($" + u.cost + ")";
    b.onclick = () => { if(money >= u.cost){ money -= u.cost; u.effect(); b.disabled = true; } };
    uMenu.appendChild(b);
});

loop();
</script>
</body>
</html>
