<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downfall - USA Edition</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; font-family: 'Arial', sans-serif; overflow: hidden; flex-direction: column; }
        #game-container { position: relative; width: 400px; height: 600px; }
        canvas { background: #000; border: 4px solid #333; display: block; }
        #ui { color: #ffff00; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.85); color: white; text-align: center; z-index: 10;
        }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; color: #000; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #00cca3; transform: scale(1.05); }
        #restartBtn { background: #ff3366; color: white; }
        .instructions { color: #888; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="startOverlay" class="overlay">
            <h1 style="color: #00ffcc; letter-spacing: 2px;">DOWNFALL</h1>
            <button id="startBtn">START GAME & PLAY MUSIC</button>
        </div>
        <div id="gameOverOverlay" class="overlay" style="display: none;">
            <h1 style="font-size: 40px; color: #ff3366;">GAME OVER</h1>
            <p id="finalScore" style="font-size: 20px;">Final Score: 0</p>
            <button id="restartBtn">TRY AGAIN</button>
        </div>
    </div>
    <div class="instructions">Arrows ← → Move | Space Jump | Collect Trump +1 | 🚩 Flags -2</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreText = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        canvas.width = 400;
        canvas.height = 600;

        // Assets
        const bombImg = new Image();
        bombImg.src = 'images/german flag copy.png'; 
        const starImg = new Image();
        starImg.src = 'images/trump.png';
        const playerImg = new Image();
        playerImg.src = 'images/usa.png';

        // Music & Sounds
        const bgm = new Audio('music/german copy.mp3');
        bgm.loop = true;
        bgm.volume = 0.5;

        const bombSound = new Audio('music/downfall.wav');
        bombSound.volume = 0.8;

        const starSound = new Audio('music/bing.wav'); // Added star sound
        starSound.volume = 0.7;

        let score, gameActive, animationId, platformSpeed;
        let player, platforms, items;
        const platformHeight = 15;
        const gapWidth = 85;
        const keys = {};

        function init() {
            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            bgm.play().catch(e => console.log("Audio play failed"));
            
            if (animationId) cancelAnimationFrame(animationId);
            score = 0;
            platformSpeed = 1.5;
            gameActive = true;
            ui.innerText = `Score: ${score}`;

            player = { 
                x: 200, y: 150, 
                radius: 12, 
                width: 30,  
                height: 30, 
                speed: 5, dy: 0, gravity: 0.5, jumpPower: -10 
            };
            
            platforms = [];
            items = [];

            for (let i = 0; i < 6; i++) {
                addPlatform(250 + i * 110);
            }
            gameLoop();
        }

        function addPlatform(y) {
            const gapX = Math.random() * (canvas.width - gapWidth);
            platforms.push({ y, gapX });
            const rand = Math.random();
            if (rand < 0.4) addItem(y - 45, 'star');
            else if (rand < 0.6) addItem(y - 35, 'bomb');
        }

        function addItem(y, type) {
            const isStar = (type === 'star');
            items.push({
                x: Math.random() * (canvas.width - 80) + 40,
                y: y,
                type: type,
                width: isStar ? 65 : 60,
                height: isStar ? 65 : 40,
                radius: isStar ? 28 : 25
            });
        }

        startBtn.onclick = init;
        restartBtn.onclick = init;
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        function update() {
            if (!gameActive) return;

            if (keys['ArrowLeft'] && player.x > player.width/2) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width/2) player.x += player.speed;

            player.dy += player.gravity;
            player.y += player.dy;

            let onPlatform = false;

            for (let i = platforms.length - 1; i >= 0; i--) {
                let p = platforms[i];
                p.y -= platformSpeed;

                if (player.dy >= 0 && player.y + player.radius > p.y && player.y + player.radius < p.y + platformHeight + player.dy) {
                    if (player.x < p.gapX || player.x > p.gapX + gapWidth) {
                        player.y = p.y - player.radius;
                        player.dy = 0;
                        onPlatform = true;
                    }
                }
                if (p.y < -platformHeight) {
                    platforms.splice(i, 1);
                    addPlatform(canvas.height);
                    platformSpeed += 0.02; 
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                let it = items[i];
                it.y -= platformSpeed;
                const dist = Math.hypot(player.x - it.x, player.y - it.y);
                if (dist < player.radius + it.radius) {
                    if (it.type === 'star') {
                        score += 1;
                        // Play Bing sound on star touch
                        starSound.currentTime = 0;
                        starSound.play();
                    } else if (it.type === 'bomb') {
                        score = Math.max(0, score - 2); 
                        bombSound.currentTime = 0;
                        bombSound.play();
                    }
                    items.splice(i, 1);
                    ui.innerText = `Score: ${score}`;
                } else if (it.y < -70) {
                    items.splice(i, 1);
                }
            }

            if (keys['Space'] && onPlatform) player.dy = player.jumpPower;
            if (player.y < -50 || player.y > canvas.height + 50) {
                gameActive = false;
                finalScoreText.innerText = `Final Score: ${score}`;
                gameOverOverlay.style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ffcc';
            platforms.forEach(p => {
                ctx.fillRect(0, p.y, p.gapX, platformHeight);
                ctx.fillRect(p.gapX + gapWidth, p.y, canvas.width - (p.gapX + gapWidth), platformHeight);
            });
            items.forEach(it => {
                const img = it.type === 'star' ? starImg : bombImg;
                ctx.drawImage(img, it.x - it.width/2, it.y - it.height/2, it.width, it.height);
            });
            ctx.drawImage(playerImg, player.x - player.width/2, player.y - player.height/2, player.width, player.height);
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
