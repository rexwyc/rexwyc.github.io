<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Passive Voice • Infinite Loop Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      padding: 20px 16px 40px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* main card container */
    .quiz-container {
      max-width: 650px;
      width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 56px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25), 0 1px 3px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header */
    .quiz-header {
      background: #1e2f4e;
      padding: 22px 24px;
      color: white;
      text-align: center;
    }

    .quiz-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      word-break: keep-all;
    }

    .quiz-header p {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-top: 8px;
    }

    .stats-bar {
      display: flex;
      justify-content: space-between;
      background: #0f1a2c;
      padding: 12px 24px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #cddcec;
      border-bottom: 1px solid #2a3a55;
    }

    .question-counter, .attempt-badge {
      background: #253c5c;
      padding: 4px 12px;
      border-radius: 40px;
    }

    /* main content */
    .question-card {
      padding: 28px 24px 20px;
    }

    .question-text {
      font-size: 1.65rem;
      font-weight: 600;
      line-height: 1.3;
      color: #0a1c2f;
      margin-bottom: 28px;
      word-break: break-word;
    }

    /* options */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 28px;
    }

    .option {
      background: #ffffff;
      border: 1.5px solid #cbdbe0;
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .option:hover {
      background: #eef3fc;
      border-color: #8ba3c7;
      transform: scale(0.99);
    }

    .option-prefix {
      font-weight: 800;
      background: #eef2f7;
      width: 32px;
      height: 32px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1f4973;
    }

    /* feedback + explanation */
    .feedback-area {
      background: #f1f5f9;
      border-radius: 32px;
      padding: 18px 20px;
      margin: 16px 0 20px;
      border-left: 5px solid #3a6ea5;
      transition: 0.15s;
    }

    .feedback-correct {
      background: #e3f5ec;
      border-left-color: #1e7b48;
    }

    .feedback-wrong {
      background: #fee9e6;
      border-left-color: #c23d2b;
    }

    .feedback-text {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    .explanation-text {
      font-size: 0.95rem;
      color: #2c3e4e;
      line-height: 1.4;
    }

    /* next button */
    .next-btn {
      width: 100%;
      background: #1e2f4e;
      border: none;
      padding: 16px 20px;
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      margin-bottom: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .next-btn:active {
      transform: scale(0.97);
      background: #10273f;
    }

    .next-btn:disabled {
      background: #9aaebf;
      transform: none;
      cursor: not-allowed;
    }

    .reset-note {
      text-align: center;
      font-size: 0.75rem;
      margin: 12px 0 8px;
      color: #5e6f88;
    }

    footer {
      text-align: center;
      padding: 14px;
      font-size: 0.7rem;
      background: #f9fcff;
      border-top: 1px solid #e2e8f0;
      color: #4a627a;
    }

    /* phone friendliness */
    @media (max-width: 550px) {
      body {
        padding: 12px 12px 20px;
      }
      .question-text {
        font-size: 1.4rem;
      }
      .option {
        padding: 12px 16px;
        font-size: 0.92rem;
      }
      .quiz-header h1 {
        font-size: 1.5rem;
      }
      .stats-bar {
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
<div class="quiz-container" id="quizRoot">
  <div class="quiz-header">
    <h1>📖 Passive Voice</h1>
    <p>infinite loop • 30 unique questions • learn as you go</p>
  </div>
  <div class="stats-bar">
    <span class="question-counter" id="qCounter">Question 1 / 30</span>
    <span class="attempt-badge" id="attemptTag">♾️ infinite mode</span>
  </div>
  <div class="question-card">
    <div class="question-text" id="questionText">Loading questions...</div>
    <div class="options-list" id="optionsContainer"></div>
    <div class="feedback-area" id="feedbackArea" style="display: none;">
      <div class="feedback-text" id="feedbackTitle"></div>
      <div class="explanation-text" id="explanationDetail"></div>
    </div>
    <button class="next-btn" id="nextButton">➡ NEXT QUESTION</button>
    <div class="reset-note">✨ Every correct answer gives a fresh random question — infinite play!</div>
  </div>
  <footer>⚡ English Grammar • Passive transformation • Explanation after each answer</footer>
</div>

<script>
  // ----- 30 UNIQUE QUESTIONS (Active -> convert to Passive Voice mentally)
  // Each item: activeSentence, correctPassiveAnswer, explanation
  const questionBank = [
    { active: "The chef prepares a delicious meal every evening.", correct: "A delicious meal is prepared every evening by the chef.", explanation: "Present simple active → passive: 'is prepared' (object becomes subject)." },
    { active: "The committee has approved the new proposal.", correct: "The new proposal has been approved by the committee.", explanation: "Present perfect active → passive: 'has been + past participle'." },
    { active: "Someone stole my bicycle yesterday.", correct: "My bicycle was stolen yesterday.", explanation: "Simple past active → passive: 'was/were + past participle' (agent omitted)." },
    { active: "The company will launch a new product next month.", correct: "A new product will be launched next month by the company.", explanation: "Future simple (will) → passive: 'will be + past participle'." },
    { active: "The teacher is explaining the passive voice right now.", correct: "The passive voice is being explained right now by the teacher.", explanation: "Present continuous → passive: 'is being + past participle'." },
    { active: "They were repairing the bridge when the storm hit.", correct: "The bridge was being repaired when the storm hit.", explanation: "Past continuous → passive: 'was/were being + past participle'." },
    { active: "The famous author wrote three novels.", correct: "Three novels were written by the famous author.", explanation: "Simple past (wrote) → passive: 'were written'." },
    { active: "You must complete the report today.", correct: "The report must be completed today.", explanation: "Modal verb (must) → passive: 'must be + past participle'." },
    { active: "The storm has damaged several houses.", correct: "Several houses have been damaged by the storm.", explanation: "Present perfect passive: 'have been damaged'." },
    { active: "The scientist discovered a new element.", correct: "A new element was discovered by the scientist.", explanation: "Past simple → was/were + PP (discovered)." },
    { active: "They will announce the winners tomorrow.", correct: "The winners will be announced tomorrow.", explanation: "Future passive: 'will be announced' (agent optional)." },
    { active: "The dog is chasing the cat.", correct: "The cat is being chased by the dog.", explanation: "Present continuous active → passive: 'is being chased'." },
    { active: "The management offered her a promotion.", correct: "She was offered a promotion by the management.", explanation: "Indirect object becomes subject (common passive pattern)." },
    { active: "Someone had cleaned the office before we arrived.", correct: "The office had been cleaned before we arrived.", explanation: "Past perfect active → passive: 'had been + past participle'." },
    { active: "The builders are constructing a new hospital.", correct: "A new hospital is being constructed by the builders.", explanation: "Present continuous passive: 'is being constructed'." },
    { active: "The politician gave a passionate speech.", correct: "A passionate speech was given by the politician.", explanation: "Simple past passive: 'was given'." },
    { active: "They can solve the issue quickly.", correct: "The issue can be solved quickly.", explanation: "Modal (can) → passive: 'can be solved'." },
    { active: "The artist painted a magnificent mural.", correct: "A magnificent mural was painted by the artist.", explanation: "Straightforward past passive transformation." },
    { active: "The waitress serves breakfast from 7 to 10 AM.", correct: "Breakfast is served from 7 to 10 AM.", explanation: "Present simple passive: 'is served' (agent omitted)." },
    { active: "Someone is following us.", correct: "We are being followed.", explanation: "Present continuous passive with object pronoun 'us' → 'we' subject." },
    { active: "The organizers will have finished the setup by noon.", correct: "The setup will have been finished by noon.", explanation: "Future perfect active → passive: 'will have been + PP'." },
    { active: "They had not informed the passengers about the delay.", correct: "The passengers had not been informed about the delay.", explanation: "Past perfect negative passive." },
    { active: "The government should reduce taxes.", correct: "Taxes should be reduced by the government.", explanation: "Modal 'should' -> 'should be reduced'." },
    { active: "The kids have eaten all the cookies.", correct: "All the cookies have been eaten by the kids.", explanation: "Present perfect passive example." },
    { active: "A sudden noise startled the baby.", correct: "The baby was startled by a sudden noise.", explanation: "Past simple passive, emphasis on receiver." },
    { active: "The committee is reviewing the applications.", correct: "The applications are being reviewed by the committee.", explanation: "Present continuous passive plural 'are being reviewed'." },
    { active: "They offered John the job.", correct: "John was offered the job.", explanation: "Indirect object passive: 'was offered'." },
    { active: "Lightning struck the old oak tree.", correct: "The old oak tree was struck by lightning.", explanation: "Irregular past participle (struck) in passive." },
    { active: "The rescue team will evacuate the residents.", correct: "The residents will be evacuated by the rescue team.", explanation: "Future passive with 'will be evacuated'." },
    { active: "People speak Spanish in many countries.", correct: "Spanish is spoken in many countries.", explanation: "General truth passive: 'is spoken'." }
  ];

  // ensure we have exactly 30
  console.assert(questionBank.length === 30, "Need 30 questions");

  // ----- QUIZ STATE (infinite loop)
  let currentQuestionObj = null;      // stores the active question (randomly selected each turn)
  let currentSelectedOption = null;   // store selected option letter for ui state
  let isAnswered = false;              // lock after answer until next
  let nextButtonDisabled = true;       // next disabled until answer given
  
  // DOM elements
  const questionTextEl = document.getElementById('questionText');
  const optionsContainer = document.getElementById('optionsContainer');
  const feedbackArea = document.getElementById('feedbackArea');
  const feedbackTitle = document.getElementById('feedbackTitle');
  const explanationDetail = document.getElementById('explanationDetail');
  const nextButton = document.getElementById('nextButton');
  const qCounterSpan = document.getElementById('qCounter');

  // Helper: pick random question from bank (infinite variety)
  function getRandomQuestion() {
    const randomIndex = Math.floor(Math.random() * questionBank.length);
    return { ...questionBank[randomIndex] }; // clone
  }

  // build shuffled distractors based on the correct answer (active + correct passive)
  // we generate 3 plausible incorrect passive forms
  function generateDistractors(activeSentence, correctAnswer) {
    // dynamic distractors based on typical errors:
    // 1) wrong tense auxiliary (e.g., present instead of past)
    // 2) wrong participle form
    // 3) word order/ 'being' misplacement, or active voice leftover
    const distractorSet = new Set();
    distractorSet.add(correctAnswer);
    
    // helper: add potential distractors if they differ from correct
    const tryAdd = (candidate) => {
      if (candidate && candidate !== correctAnswer && candidate.length > 5) distractorSet.add(candidate);
    };
    
    // Distractor A: active voice repeated (common trap)
    tryAdd(activeSentence);
    
    // Distractor B: swap auxiliary (is/are/was/were) mismatched
    if (correctAnswer.includes(' is ') || correctAnswer.includes(' are ') || correctAnswer.includes(' was ') || correctAnswer.includes(' were ')) {
      let swapped = correctAnswer.replace(/\b(is|are|was|were)\b/, (match) => {
        if (match === 'is') return 'are';
        if (match === 'are') return 'is';
        if (match === 'was') return 'were';
        return 'was';
      });
      tryAdd(swapped);
    }
    
    // Distractor C: missing past participle or using base verb
    let participleCorrupt = correctAnswer.replace(/\b(?:prepared|stolen|approved|launched|explained|repaired|written|completed|damaged|discovered|announced|chased|offered|cleaned|constructed|given|solved|painted|served|followed|finished|informed|reduced|eaten|startled|reviewed|struck|evacuated|spoken)\b/gi, (match) => {
      // just replace with -ing form for some errors
      if (match === 'prepared') return 'prepare';
      if (match === 'stolen') return 'steal';
      if (match === 'approved') return 'approve';
      if (match === 'launched') return 'launching';
      if (match === 'explained') return 'explain';
      if (match === 'repaired') return 'repairing';
      return match + 'ed'; // weird
    });
    if (participleCorrupt !== correctAnswer) tryAdd(participleCorrupt);
    
    // Distractor D: remove 'by' agent incorrectly
    let withoutAgent = correctAnswer.replace(/\s+by\s+the\s+\w+|\s+by\s+\w+/i, '');
    if (withoutAgent !== correctAnswer && withoutAgent.trim().length > 5) tryAdd(withoutAgent);
    
    // Distractor E: using being + past without proper auxiliary ( "is being prepared" vs "is prepared")
    if (correctAnswer.includes(' is ') && !correctAnswer.includes('being')) {
      let beingForm = correctAnswer.replace(/\b(is|are)\b/, '$1 being');
      tryAdd(beingForm);
    } else if (correctAnswer.includes('was') && !correctAnswer.includes('being') && correctAnswer.match(/was\s+\w+ed/)) {
      let beingForm = correctAnswer.replace(/\b(was|were)\b/, '$1 being');
      tryAdd(beingForm);
    }
    
    // ensure we have at least 3 distractors, fill with generic entries if not enough
    const fallbackDistractors = [
      "The sentence was transform incorrectly.",
      "Passive voice misuse here.",
      "Auxiliary verb error.",
      "The action is performed wrong."
    ];
    let distractorArray = Array.from(distractorSet).filter(d => d !== correctAnswer);
    while (distractorArray.length < 3) {
      distractorArray.push(fallbackDistractors[distractorArray.length % fallbackDistractors.length]);
    }
    // pick exactly 3 unique distractors (shuffle later)
    return distractorArray.slice(0, 3);
  }
  
  // Shuffle options (correct + 3 distractors) and render
  function renderQuestion(question) {
    // generate distractors dynamically based on active & correct
    const activeText = question.active;
    const correctPassive = question.correct;
    const distractorsRaw = generateDistractors(activeText, correctPassive);
    let options = [correctPassive, ...distractorsRaw];
    // shuffle Fisher-Yates
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    // store mapping of option texts to letters for display
    const optionLetters = ['A', 'B', 'C', 'D'];
    // clear container
    optionsContainer.innerHTML = '';
    // create option elements
    options.forEach((opt, idx) => {
      const optionDiv = document.createElement('div');
      optionDiv.className = 'option';
      optionDiv.setAttribute('data-value', opt);
      const prefixSpan = document.createElement('span');
      prefixSpan.className = 'option-prefix';
      prefixSpan.innerText = optionLetters[idx];
      const textSpan = document.createElement('span');
      textSpan.innerText = opt;
      optionDiv.appendChild(prefixSpan);
      optionDiv.appendChild(textSpan);
      optionDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isAnswered) return; // already answered, prevent change
        handleAnswer(opt, question.correct, question.explanation);
        // highlight selected
        document.querySelectorAll('.option').forEach(optEl => {
          optEl.style.backgroundColor = '';
          optEl.style.borderColor = '#cbdbe0';
        });
        optionDiv.style.backgroundColor = '#e2eafc';
        optionDiv.style.borderColor = '#3a6ea5';
        currentSelectedOption = optionDiv;
      });
      optionsContainer.appendChild(optionDiv);
    });
    // reset UI after rendering question
    isAnswered = false;
    nextButtonDisabled = true;
    nextButton.disabled = true;
    feedbackArea.style.display = 'none';
    // remove any leftover highlights
    currentSelectedOption = null;
    // update question text
    questionTextEl.innerText = `✍️ ${activeText}`;
  }
  
  // handle answer selection, show explanation, disable further clicks
  function handleAnswer(selected, correctAnswer, explanation) {
    if (isAnswered) return;
    const isCorrect = (selected === correctAnswer);
    isAnswered = true;
    // show feedback area
    feedbackArea.style.display = 'block';
    if (isCorrect) {
      feedbackArea.classList.add('feedback-correct');
      feedbackArea.classList.remove('feedback-wrong');
      feedbackTitle.innerHTML = '✅ CORRECT! Well done.';
    } else {
      feedbackArea.classList.add('feedback-wrong');
      feedbackArea.classList.remove('feedback-correct');
      feedbackTitle.innerHTML = `❌ INCORRECT. The right answer is:`;
      // show correct answer inside explanation part
      explanationDetail.innerHTML = `<strong>✔️ Correct passive:</strong> "${correctAnswer}"<br><br>📖 <strong>Explanation:</strong> ${explanation}`;
      explanationDetail.style.display = 'block';
      // also mark for clarity but we still show explanation fully
      // override normal explanation display to show clearly
      // we'll embed correct answer in explanation
      // we also want to show explanation as dedicated
      explanationDetail.innerHTML = `<strong>✔️ Correct passive:</strong> "${correctAnswer}"<br><br>📖 ${explanation}`;
      feedbackTitle.innerHTML = '❌ INCORRECT — See correction below.';
      // done
    }
    if (isCorrect) {
      // correct: also show explanation but without specific correct answer double? but we show default
      explanationDetail.innerHTML = `📖 ${explanation}`;
      feedbackTitle.innerHTML = '✅ CORRECT! + Explanation';
    }
    // ensure explanation works for both cases
    if (!isCorrect) {
      // already set above
    } else {
      explanationDetail.innerHTML = `📖 ${explanation}`;
    }
    // enable next button
    nextButton.disabled = false;
    nextButtonDisabled = false;
  }
  
  // load next random question (infinite loop)
  function loadNextQuestion() {
    if (!isAnswered && currentQuestionObj !== null) {
      // small guard: if next pressed without answer? button disabled anyway, but just safety
      return;
    }
    // get fresh random question
    const newQ = getRandomQuestion();
    currentQuestionObj = {
      active: newQ.active,
      correct: newQ.correct,
      explanation: newQ.explanation
    };
    // update counter with stylistic "infinite loop": show question number in order 1..30 but cycles because fresh random each time.
    // To show something friendly: we count attempts. but spec just shows question position? We'll show "random from 30"
    const randomIndexHint = Math.floor(Math.random() * 30) + 1;
    qCounterSpan.innerHTML = `🎲 Random #${randomIndexHint} / 30 • ∞ loop`;
    renderQuestion(currentQuestionObj);
  }
  
  // event listener on next button
  nextButton.addEventListener('click', () => {
    if (!isAnswered) return; // double safety
    loadNextQuestion();
  });
  
  // initial load
  function initQuiz() {
    const firstQuestion = getRandomQuestion();
    currentQuestionObj = {
      active: firstQuestion.active,
      correct: firstQuestion.correct,
      explanation: firstQuestion.explanation
    };
    renderQuestion(currentQuestionObj);
    qCounterSpan.innerHTML = `🎲 Random / 30 • ♾️ infinite`;
    isAnswered = false;
    nextButton.disabled = true;
  }
  
  initQuiz();
</script>
</body>
</html>
