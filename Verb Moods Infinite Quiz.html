<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Equations Master Quiz</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --accent-color: #9b59b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 20px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .score-board {
            font-weight: bold;
            color: var(--primary-color);
        }

        .badge {
            background: #e1f5fe;
            color: var(--primary-color);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .question-box {
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }

        .prompt-text {
            font-size: 0.95rem;
            color: #7f8c8d;
            display: block;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .equation {
            display: block;
            text-align: center;
            font-size: 1.4rem;
            margin: 10px 0 15px 0;
            color: var(--accent-color);
            font-style: italic;
        }

        .options-list {
            list-style: none;
        }

        .option-btn {
            display: block;
            width: 100%;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .explanation-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 4px solid var(--primary-color);
            border-radius: 0 8px 8px 0;
            display: none;
            font-size: 0.95rem;
            text-align: left;
        }

        .action-btn {
            display: block;
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        .action-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <span class="score-board">Score: <span id="score">0</span></span>
        <span class="badge" id="category-badge">Loading...</span>
    </div>

    <div class="question-box">
        <span class="prompt-text" id="prompt-text">Solve the equation:</span>
        <span class="equation" id="equation-text"></span>
    </div>

    <div id="options-container" class="options-list"></div>

    <div id="explanation" class="explanation-box"></div>

    <button id="next-btn" class="action-btn" onclick="nextQuestion()">Next Question &rarr;</button>
</div>

    { equation: "x² + 2x - 8 = 0", prompt: "Solve the equation:", options: ["x = 2 or x = -4", "x = -2 or x = 4", "x = 1 or x = -8", "x = -1 or x = 8"], correct: 0, category: "Factoring", explanation: "Factors into (x + 4)(x - 2) = 0, which yields x = 2 or x = -4." },
    { equation: "x² - 11x + 24 = 0", prompt: "Solve the equation:", options: ["x = 2 or x = 12", "x = 3 or x = 8", "x = -3 or x = -8", "x = 4 or x = 6"], correct: 1, category: "Factoring", explanation: "Factors into (x - 3)(x - 8) = 0. Thus, x = 3 or x = 8." },

    { equation: "x² + 4x - 9 = 0", prompt: "Solve via formula:", options: ["x = -2 &plusmn; &radic;13", "x = -2 &plusmn; &radic;5", "x = -4 &plusmn; &radic;52", "x = 2 &plusmn; &radic;13"], correct: 0, category: "Quadratic Formula", explanation: "x = [-4 &plusmn; &radic;(16 - 4(1)(-9))] / 2 = [-4 &plusmn; &radic;52] / 2 = [-4 &plusmn; 2&radic;13] / 2 = -2 &plusmn; &radic;13." },

let currentQuestionIndex = 0;
let answered = false;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Initial mix
shuffleArray(questionPool);

function loadQuestion() {
    answered = false;
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('explanation').style.display = 'none';
    
    let q = questionPool[currentQuestionIndex % questionPool.length];
    
    document.getElementById('category-badge').innerText = q.category;
    document.getElementById('prompt-text').innerText = q.prompt;
    document.getElementById('equation-text').innerHTML = q.equation;
    
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = option;
        btn.onclick = () => selectOption(index, btn);
        optionsContainer.appendChild(btn);
    });
}

function selectOption(selectedIndex, selectedBtn) {
    if (answered) return; 
    answered = true;
    
    let q = questionPool[currentQuestionIndex % questionPool.length];
    const buttons = document.querySelectorAll('.option-btn');
    
    if (selectedIndex === q.correct) {
        selectedBtn.classList.add('correct');
        score++;
        document.getElementById('score').innerText = score;
    } else {
        selectedBtn.classList.add('wrong');
        buttons[q.correct].classList.add('correct'); 
    }
    
    const expBox = document.getElementById('explanation');
    expBox.innerHTML = `<strong>Explanation:</strong> ${q.explanation}`;
    expBox.style.display = 'block';
    
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentQuestionIndex++;
    
    if (currentQuestionIndex % questionPool.length === 0) {
        shuffleArray(questionPool);
    }
    
    loadQuestion();
}

window.onload = loadQuestion;
</script>
