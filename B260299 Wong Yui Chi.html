<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wong Yui Chi</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --hover-color: #1abc9c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 40px;
            font-size: 2.5rem;
            position: relative;
            padding-bottom: 15px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        /* Grid Arrangement */
        .grid-container {
            display: grid;
            /* Creates a responsive grid that automatically calculates columns with a minimum width of 250px */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 0;
            list-style-type: none;
            /* Centers the grid items horizontally if they don't fill the entire row */
            justify-content: center; 
        }

        .grid-item {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border-top: 4px solid var(--primary-color);
            display: flex;
            /* Prevents cards from stretching infinitely if the screen is very wide */
            max-width: 350px; 
            width: 100%;
        }

        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            border-top-color: var(--hover-color);
        }

        .grid-item a {
            display: block;
            width: 100%;
            padding: 25px 20px;
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.15rem;
            text-align: center;
            transition: color 0.2s ease;
        }

        .grid-item a:hover {
            color: var(--hover-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Wong Yui Chi</h1>
        
        <ul class="grid-container">
            <li class="grid-item"><a href="https://rexwyc.github.io/english.html" target="_blank">English Grammar</a></li>
            <li class="grid-item"><a href="https://rexwyc.github.io/Game.html" target="_blank">Games & Hobbies</a></li>
        </ul>
    </div>

</body>
</html>
