<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type 3 Conditional Quiz</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #666;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 6px;
            border-radius: 3px;
            width: 100%;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .option-btn:hover {
                background: #edf2f7;
                border-color: #cbd5e0;
            }
        }

        .option-btn.correct {
            background-color: #e6fffa;
            border-color: var(--success-color);
            color: #171923;
        }

        .option-btn.wrong {
            background-color: #fff5f5;
            border-color: var(--error-color);
            color: #171923;
        }

        .option-btn:disabled {
            pointer-events: none;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #ebf8ff;
            border-left: 4px solid var(--primary-color);
            display: none;
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #2b6cb0;
        }

        .feedback-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .next-btn {
            margin-top: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
            width: 100%;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .next-btn:active {
            transform: scale(0.98);
        }

        .grammar-tip {
            font-size: 0.8rem;
            color: #718096;
            text-align: center;
            margin-top: 15px;
            border-top: 1px solid #edf2f7;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <span id="question-number">Question 1/30</span>
        <span id="score-display">Score: 0</span>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="question-box" id="question-text">
        Loading question...
    </div>

    <div class="options-container" id="options-container">
        </div>

    <div class="feedback-box" id="feedback-box">
        <div class="feedback-title" id="feedback-title">Explanation</div>
        <div class="feedback-text" id="feedback-explanation"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>

    <div class="grammar-tip">
        <strong>Rule Check:</strong> If + Past Perfect (had + V3), ... would have + Past Participle (V3)
    </div>
</div>

<script>
    const questions = [
        { q: "If you ________ (study) harder, you would have passed the exam.", options: ["had studied", "studied", "would study", "have studied"], correct: 0, exp: "Type 3 uses 'had + past participle' in the if-clause to refer to an unfulfilled condition in the past." },
        { q: "We would have arrived on time if we ________ (not miss) the train.", options: ["didn't miss", "hadn't missed", "wouldn't miss", "haven't missed"], correct: 1, exp: "The negative past perfect form is 'hadn't + past participle' for the condition clause." },
        { q: "If I had known it was your birthday, I ________ (buy) a gift.", options: ["would buy", "bought", "would have bought", "will buy"], correct: 2, exp: "The main clause needs 'would have + past participle' to reflect a past result that didn't happen." },
        { q: "They ________ (win) the match if the referee hadn't made that mistake.", options: ["would have won", "will win", "had won", "would win"], correct: 0, exp: "The main clause expresses the hypothetical past result using 'would have' + third form of the verb." },
        { q: "If she ________ (ask) me, I would have helped her move.", options: ["asks", "had asked", "would ask", "would have asked"], correct: 1, exp: "The 'if' clause requires the past perfect 'had asked'." },
        { q: "If it hadn't rained, we ________ (go) for a picnic in the park.", options: ["would go", "had gone", "would have gone", "went"], correct: 2, exp: "Use 'would have gone' to form the hypothetical past result." },
        { q: "What ________ you ________ if you had lost your passport?", options: ["would / have done", "had / done", "would / do", "will / do"], correct: 0, exp: "In questions, invert the helper verb: 'would' + subject + 'have' + past participle." },
        { q: "If I ________ (not buy) that expensive car, I would have saved enough money.", options: ["didn't buy", "haven't bought", "hadn't bought", "wouldn't buy"], correct: 2, exp: "The condition clause requires 'hadn't bought' (past perfect negative)." },
        { q: "If he ________ (be) more careful, he wouldn't have broken the vase.", options: ["was", "had been", "would be", "has been"], correct: 1, exp: "The past perfect of 'be' is 'had been'." },
        { q: "She would have gotten the job if she ________ (prepare) for the interview.", options: ["had prepared", "prepared", "would prepare", "would have prepared"], correct: 0, exp: "The if-clause requires 'had' + V3 format." },
        { q: "If they had arrived earlier, they ________ (catch) the flight.", options: ["would catch", "caught", "would have caught", "had caught"], correct: 2, exp: "Use 'would have' followed by the V3 form 'caught' for the result." },
        { q: "If you ________ (tell) me the truth, I wouldn't have been so angry.", options: ["had told", "told", "would tell", "have told"], correct: 0, exp: "'Had told' is the past perfect needed for this unreal past situation." },
        { q: "We wouldn't have gotten lost if we ________ (use) the GPS map.", options: ["used", "had used", "would use", "have used"], correct: 1, exp: "The condition requires 'had used' (past perfect) to mirror a past regret." },
        { q: "If the alarm ________ (go) off, I wouldn't have overslept.", options: ["went", "had gone", "would go", "has gone"], correct: 1, exp: "The past perfect of 'go' is 'had gone'." },
        { q: "I ________ (call) you if my phone hadn't died.", options: ["would have called", "would call", "had called", "called"], correct: 0, exp: "The hypothetical outcome is expressed via 'would have called'." },
        { q: "If he ________ (not take) that job, he would have started his own business.", options: ["hadn't taken", "didn't take", "wouldn't take", "hasn't taken"], correct: 0, exp: "'Hadn't taken' perfectly matches the structure required for an unreal past choice." },
        { q: "If she ________ (wear) her coat, she wouldn't have caught a cold.", options: ["wore", "had worn", "had wear", "would wear"], correct: 1, exp: "The past participle of 'wear' is 'worn', matching with 'had'." },
        { q: "They would have visited us if they ________ (have) more free time.", options: ["had", "had had", "would have", "have had"], correct: 1, exp: "'Had had' is correct. The first 'had' is the auxiliary verb; the second is the V3 of 'have'." },
        { q: "If the driver ________ (stop) at the red light, the accident wouldn't have happened.", options: ["stopped", "had stopped", "would stop", "has stopped"], correct: 1, exp: "Use 'had stopped' to change an event that already occurred in the past." },
        { q: "I ________ (give) you a ride if I had seen you walking.", options: ["would have given", "would give", "had given", "gave"], correct: 0, exp: "The main clause result needs 'would have given' (give -> gave -> given)." },
        { q: "If we ________ (know) the restaurant was closed, we wouldn't have gone there.", options: ["knew", "had known", "would know", "have known"], correct: 1, exp: "The condition requires the past perfect form 'had known'." },
        { q: "She wouldn't have dropped the cake if she ________ (not turn) around quickly.", options: ["didn't turn", "hadn't turned", "wouldn't turn", "hasn't turned"], correct: 1, exp: "The negative past perfect format 'hadn't turned' fits the conditional rule." },
        { q: "If you hadn't left your keys, we ________ (not get) locked out.", options: ["wouldn't get", "hadn't gotten", "wouldn't have gotten", "didn't get"], correct: 2, exp: "The negative result uses 'wouldn't have + V3 (gotten/got)'." },
        { q: "If they ________ (invite) us, we would have attended the wedding.", options: ["had invited", "invited", "would invite", "have invited"], correct: 0, exp: "'Had invited' completes the past perfect frame inside the condition clause." },
        { q: "The plants ________ (not die) if you had watered them regularly.", options: ["wouldn't die", "didn't die", "hadn't died", "wouldn't have died"], correct: 3, exp: "Use 'wouldn't have died' for an imaginary negative outcome in the past." },
        { q: "If I ________ (save) more money last year, I would have bought a new laptop.", options: ["saved", "had saved", "would save", "have saved"], correct: 1, exp: "Past perfect 'had saved' marks the unrealized condition in the past time frame." },
        { q: "We would have enjoyed the concert more if the sound ________ (be) better.", options: ["was", "had been", "would be", "has been"], correct: 1, exp: "The condition clause takes 'had been' to express an imagined past state." },
        { q: "If he ________ (not look) at his phone, he wouldn't have tripped.", options: ["didn't look", "hadn't looked", "wouldn't look", "hasn't looked"], correct: 1, exp: "'Hadn't looked' builds the proper past perfect condition." },
        { q: "If she had run faster, she ________ (win) the gold medal.", options: ["would win", "won", "would have won", "had won"], correct: 2, exp: "The phrase 'would have won' indicates an unfulfilled outcome." },
        { q: "If I ________ (realize) you were waiting, I would have rushed.", options: ["realized", "had realized", "would realize", "have realized"], correct: 1, exp: "The condition 'had realized' completes the final conditional pattern." }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let loopCount = 1;

    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const feedbackBox = document.getElementById("feedback-box");
    const feedbackExplanation = document.getElementById("feedback-explanation");
    const nextBtn = document.getElementById("next-btn");
    const questionNumber = document.getElementById("question-number");
    const scoreDisplay = document.getElementById("score-display");
    const progressFill = document.getElementById("progress-fill");

    function loadQuestion() {
        feedbackBox.style.display = "none";
        nextBtn.style.display = "none";
        
        let qIndex = currentQuestionIndex % questions.length;
        let currentQuestion = questions[qIndex];

        // Updates progress displays
        let displayNum = qIndex + 1;
        let loopSuffix = loopCount > 1 ? ` (Loop ${loopCount})` : "";
        questionNumber.innerText = `Question ${displayNum}/${questions.length}${loopSuffix}`;
        
        let progressPercent = (displayNum / questions.length) * 100;
        progressFill.style.width = `${progressPercent}%`;

        questionText.innerText = currentQuestion.q;
        optionsContainer.innerHTML = "";

        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.innerText = option;
            button.onclick = () => checkAnswer(index, currentQuestion.correct, currentQuestion.exp);
            optionsContainer.appendChild(button);
        });
    }

    function checkAnswer(selectedIndex, correctIndex, explanation) {
        const buttons = optionsContainer.getElementsByClassName("option-btn");
        
        for (let i = 0; i < buttons.length; i++) {
            buttons[i].disabled = true;
            if (i === correctIndex) {
                buttons[i].classList.add("correct");
            }
        }

        if (selectedIndex === correctIndex) {
            score++;
            scoreDisplay.innerText = `Score: ${score}`;
        } else {
            buttons[selectedIndex].classList.add("wrong");
        }

        feedbackExplanation.innerText = explanation;
        feedbackBox.style.display = "block";
        nextBtn.style.display = "block";
        
        // Auto scroll down smoothly on small touch displays
        setTimeout(() => {
            nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        // Triggers the infinite loop reset flags
        if (currentQuestionIndex % questions.length === 0) {
            loopCount++;
        }
        
        loadQuestion();
    }

    // Launch the game initially
    loadQuestion();
</script>

</body>
</html>
