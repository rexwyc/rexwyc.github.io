<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE Math: Shape & Space Trainer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: var(--dark);
            display: flex;
            justify-content: center;
            padding: 15px;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .score-board {
            font-size: 0.9rem;
            font-weight: bold;
            color: #64748b;
        }

        .score-val {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: inline-block;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-option {
            background: var(--light);
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-option:active {
            transform: scale(0.98);
        }

        .btn-option.correct {
            background-color: #dcfce7;
            border-color: var(--success);
            color: #14532d;
            font-weight: bold;
        }

        .btn-option.wrong {
            background-color: #fee2e2;
            border-color: var(--error);
            color: #7f1d1d;
        }

        .explanation-box {
            background: #f1f5f9;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .explanation-box h4 {
            margin-bottom: 6px;
            color: var(--dark);
        }

        .btn-next {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: none;
            text-align: center;
        }

        .btn-next:hover {
            background: var(--primary-hover);
        }

        /* Math layout adjustments */
        sub, sup {
            font-size: 75%;
            line-height: 0;
            position: relative;
            vertical-align: baseline;
        }
        sup { top: -0.5em; }
        sub { bottom: -0.25em; }
    </style>
</head>
<body>

<div class="game-container">
    <header>
        <h2>DSE Space & Shape</h2>
        <div class="score-board">
            Score: <span id="score" class="score-val">0</span> | 
            Streak: <span id="streak" class="score-val">0</span>
        </div>
    </header>

    <div id="game-body">
        <span id="topic-badge" class="badge">Topic</span>
        <div id="question" class="question-text">Loading question...</div>
        
        <div id="options" class="options-grid">
            </div>

        <div id="explanation" class="explanation-box">
            <h4>Step-by-Step Explanation:</h4>
            <p id="explanation-text"></p>
        </div>

        <button id="btn-next" class="btn-next" onclick="nextQuestion()">Next Question &rarr;</button>
    </div>
</div>

// Game State Variables
let currentQuestionIndex = 0;
let score = 0;
let streak = 0;
let answered = false;
let orderHistory = [];

// Initialize & shuffle tracking array to prevent predictable patterns
function initGame() {
    orderHistory = [...Array(questionBank.length).keys()];
    shuffleArray(orderHistory);
    currentQuestionIndex = 0;
    showQuestion();
}

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function showQuestion() {
    answered = false;
    document.getElementById("explanation").style.display = "none";
    document.getElementById("btn-next").style.display = "none";

    // Infinite loop safeguard: reshuffle when all 50 questions are done
    if (currentQuestionIndex >= orderHistory.length) {
        shuffleArray(orderHistory);
        currentQuestionIndex = 0;
    }

    const currentQIdx = orderHistory[currentQuestionIndex];
    const qData = questionBank[currentQIdx];

    document.getElementById("topic-badge").innerText = qData.topic;
    document.getElementById("question").innerText = qData.q;
    
    const optionsContainer = document.getElementById("options");
    optionsContainer.innerHTML = "";

    qData.options.forEach((opt, idx) => {
        const button = document.createElement("button");
        button.className = "btn-option";
        button.innerText = opt;
        button.onclick = () => checkAnswer(idx, button);
        optionsContainer.appendChild(button);
    });
}

function checkAnswer(selectedIndex, selectedButton) {
    if (answered) return; // Prevent double answering
    answered = true;

    const currentQIdx = orderHistory[currentQuestionIndex];
    const qData = questionBank[currentQIdx];
    const optionButtons = document.getElementsByClassName("btn-option");

    if (selectedIndex === qData.answer) {
        selectedButton.classList.add("correct");
        score += 10;
        streak += 1;
    } else {
        selectedButton.classList.add("wrong");
        optionButtons[qData.answer].classList.add("correct"); // show true answer
        streak = 0;
    }

    // Update scoreboard elements
    document.getElementById("score").innerText = score;
    document.getElementById("streak").innerText = streak;

    // Output explanation
    document.getElementById("explanation-text").innerText = qData.steps;
    document.getElementById("explanation").style.display = "block";
    
    // Display next button
    document.getElementById("btn-next").style.display = "block";
}

function nextQuestion() {
    currentQuestionIndex++;
    showQuestion();
}

// Start game on window load
window.onload = initGame;
</script>
