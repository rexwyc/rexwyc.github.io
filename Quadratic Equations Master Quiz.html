<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Equations Master Quiz</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --accent-color: #9b59b6;
            --step-bg: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 20px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .score-board {
            font-weight: bold;
            color: var(--primary-color);
        }

        .badge {
            background: #e1f5fe;
            color: var(--primary-color);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .question-box {
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }

        .prompt-text {
            font-size: 0.95rem;
            color: #7f8c8d;
            display: block;
            margin-bottom: 5px;
            font-weight: normal;
        }

        .equation {
            display: block;
            text-align: center;
            font-size: 1.4rem;
            margin: 10px 0 15px 0;
            color: var(--accent-color);
            font-style: italic;
        }

        .options-list {
            list-style: none;
        }

        .option-btn {
            display: block;
            width: 100%;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .explanation-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 4px solid var(--primary-color);
            border-radius: 0 8px 8px 0;
            display: none;
            font-size: 0.95rem;
            text-align: left;
        }

        .steps-toggle-btn {
            display: none;
            width: 100%;
            background: #e9ecef;
            color: #495057;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            text-align: center;
        }

        .steps-container {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: var(--step-bg);
            border: 1px dashed #dee2e6;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .step-item {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .step-item::before {
            content: "•";
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.2rem;
            position: absolute;
            left: 5px;
            top: -2px;
        }

        .action-btn {
            display: block;
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        .action-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <span class="score-board">Score: <span id="score">0</span></span>

    </div>

    <div class="question-box">

    <div id="options-container" class="options-list"></div>

    <div id="explanation" class="explanation-box"></div>

    <div id="steps-container" class="steps-container"></div>

    <button id="next-btn" class="action-btn" onclick="nextQuestion()">Next Question &rarr;</button>

    document.getElementById('toggle-steps-btn').innerText = "View Step-by-Step Breakdown ↓";
    
    const stepsContainer = document.getElementById('steps-container');
    stepsContainer.style.display = 'none';
    stepsContainer.innerHTML = '';
    
    let q = questionPool[currentQuestionIndex % questionPool.length];
    
    document.getElementById('category-badge').innerText = q.category;
    document.getElementById('prompt-text').innerText = q.prompt;
    document.getElementById('equation-text').innerHTML = q.equation;
    
    const optionsContainer = document.getElementById('options-container');
    optionsContainer.innerHTML = '';
    
    q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = option;
        btn.onclick = () => selectOption(index, btn);
        optionsContainer.appendChild(btn);
    });
}

function selectOption(selectedIndex, selectedBtn) {
    if (answered) return; 
    answered = true;
    
    let q = questionPool[currentQuestionIndex % questionPool.length];
    const buttons = document.querySelectorAll('.option-btn');
    
    if (selectedIndex === q.correct) {
        selectedBtn.classList.add('correct');
        score++;
        document.getElementById('score').innerText = score;
    } else {
        selectedBtn.classList.add('wrong');
        buttons[q.correct].classList.add('correct'); 
    }
    
    document.getElementById('explanation').style.display = 'block';
    document.getElementById('explanation').innerHTML = `<strong>Summary:</strong> ${q.explanation}`;
    
    const stepsContainer = document.getElementById('steps-container');
    q.steps.forEach(stepText => {
        const stepDiv = document.createElement('div');
        stepDiv.className = 'step-item';
        stepDiv.innerHTML = stepText;
        stepsContainer.appendChild(stepDiv);
    });
    
    document.getElementById('toggle-steps-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';
}

function toggleSteps() {
    const stepsContainer = document.getElementById('steps-container');
    const toggleBtn = document.getElementById('toggle-steps-btn');
    
    if (stepsContainer.style.display === 'none' || stepsContainer.style.display === '') {
        stepsContainer.style.display = 'block';
        toggleBtn.innerText = "Hide Step-by-Step Breakdown ↑";
    } else {
        stepsContainer.style.display = 'none';
        toggleBtn.innerText = "View Step-by-Step Breakdown ↓";
    }
}

function nextQuestion() {
    currentQuestionIndex++;
    
    if (currentQuestionIndex % questionPool.length === 0) {
        shuffleArray(questionPool);
    }
    
    loadQuestion();
}

window.onload = loadQuestion;
</script>

</body>
</html>
