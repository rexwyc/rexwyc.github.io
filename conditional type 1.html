<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type 1 Conditional Game</title>
    <style>
        :root {
            --primary: #4a6fa5;
            --success: #2ec4b6;
            --danger: #e71d36;
            --background: #f4f7f6;
            --text: #2b2d42;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #6c757d;
        }

        .score-box {
            background: #e9ecef;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .btn:hover {
                background: #f8fafc;
                border-color: var(--primary);
            }
        }

        .btn.correct {
            background-color: #d4edda;
            border-color: var(--success);
            color: #155724;
        }

        .btn.wrong {
            background-color: #f8d7da;
            border-color: var(--danger);
            color: #721c24;
        }

        .btn:disabled {
            pointer-events: none;
        }

        .feedback-container {
            background: #edf2f7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .explanation {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #4a5568;
        }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 6px rgba(74, 111, 165, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <span id="progress">Question 1</span>
        <span class="score-box">Score: <span id="score">0</span></span>
    </div>
    
    <div class="question-text" id="question">Loading question...</div>
    
    <div class="options-container" id="options"></div>
    
    <div class="feedback-container" id="feedback-box">
        <div class="feedback-title" id="feedback-status"></div>
        <div class="explanation" id="explanation"></div>
    </div>
    
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
</div>

<script>
    const pool = [
        { q: "If it ______ tomorrow, we will cancel the picnic.", a: ["rains", "rain", "will rain"], c: 0, e: "Type 1 uses Simple Present ('rains') in the if-clause." },
        { q: "You will pass the exam if you ______ hard.", a: ["study", "will study", "studied"], c: 0, e: "The if-clause takes the Simple Present ('study'), even when it comes second." },
        { q: "If I ______ time tonight, I will call you.", a: ["have", "will have", "had"], c: 0, e: "Use Simple Present ('have') in the condition block." },
        { q: "If she misses the bus, she ______ late for work.", a: ["will be", "is", "would be"], c: 0, e: "The main clause uses 'will + verb' ('will be') to show the future result." },
        { q: "If they ______ arrive soon, we'll leave without them.", a: ["don't", "won't", "didn't"], c: 0, e: "Negative simple present uses 'don't' or 'doesn't'." },
        { q: "What ______ if you don't find your keys?", a: ["will you do", "do you do", "would you do"], c: 0, e: "Result questions use 'will + subject + verb'." },
        { q: "If the cake ______ delicious, I will buy another one.", a: ["is", "will be", "be"], c: 0, e: "The verb 'to be' becomes 'is' for third-person singular in present tense." },
        { q: "We will go to the beach if the weather ______ good.", a: ["is", "will be", "was"], c: 0, e: "Simple present 'is' matches the conditional structure." },
        { q: "If you ______ now, you will catch the train.", a: ["leave", "leaves", "will leave"], c: 0, e: "With 'you', use the base form 'leave' in present simple." },
        { q: "If he ______ his driving test, his parents will buy him a car.", a: ["passes", "pass", "will pass"], c: 0, e: "Third-person singular 'he' requires 'passes'." },
        { q: "I ______ buy that jacket if it's too expensive.", a: ["won't", "don't", "not will"], c: 0, e: "'Won't' (will not) expresses the negative future result." },
        { q: "If you don't eat now, you ______ hungry later.", a: ["will get", "get", "got"], c: 0, e: "Future result uses 'will get'." },
        { q: "If she ______ up early, she will go for a run.", a: ["wakes", "wake", "will wake"], c: 0, e: "Simple present 'wakes' matches 'she'." },
        { q: "They ______ the match if they don't practice.", a: ["will lose", "lose", "lost"], c: 0, e: "Future result clause requires 'will lose'." },
        { q: "If I ______ shopping later, I will buy some milk.", a: ["go", "will go", "goes"], c: 0, e: "Simple present 'go' goes in the condition clause." },
        { q: "If you touch that wire, you ______ an electric shock.", a: ["will get", "get", "would get"], c: 0, e: "Predictable future consequence needs 'will get'." },
        { q: "She will forgive you if you ______ sorry.", a: ["say", "will say", "says"], c: 0, e: "'You say' fits the simple present rule for if-clauses." },
        { q: "If we don't protect environment, climate change ______ worse.", a: ["will get", "gets", "got"], c: 0, e: "Future consequence is written with 'will get'." },
        { q: "The soup ______ taste good if you don't add salt.", a: ["won't", "doesn't", "isn't"], c: 0, e: "'Won't' is the future result negative." },
        { q: "If he ______ a job, he will move to London.", a: ["finds", "find", "will find"], c: 0, e: "'He finds' matches the simple present layout." },
        { q: "If you mix red and yellow, you ______ orange.", a: ["will get", "got", "gets"], c: 0, e: "While zero conditional works for facts, Type 1 uses 'will get' for specific predictions." },
        { q: "I'll be surprised if it ______ tonight.", a: ["doesn't snow", "won't snow", "isn't snowing"], c: 0, e: "Negative simple present condition: 'doesn't snow'." },
        { q: "If they ______ enough money, they will buy a house.", a: ["save", "saves", "will save"], c: 0, e: "Plural subject 'they' takes 'save'." },
        { q: "Your eyes will hurt if you ______ at the screen all day.", a: ["stare", "will stare", "stares"], c: 0, e: "Simple present condition requires 'stare'." },
        { q: "If you ______ the map, you won't get lost.", a: ["use", "will use", "uses"], c: 0, e: "If-clause uses the simple present form 'use'." },
        { q: "What ______ if she rejects the offer?", a: ["will happen", "happens", "would happen"], c: 0, e: "Future result question structure: 'will happen'." },
        { q: "If the ice ______ , the water will rise.", a: ["melts", "melt", "will melt"], c: 0, e: "Singular noun 'ice' takes 'melts' in present simple." },
        { q: "If you eat too much candy, your teeth ______ hurt.", a: ["will", "do", "are"], c: 0, e: "The modal 'will' is paired with the base verb 'hurt'." },
        { q: "I will tell him the news if I ______ him.", a: ["see", "will see", "sees"], c: 0, e: "Simple present condition requires 'see'." },
        { q: "If we hurry, we ______ the train.", a: ["will catch", "catch", "caught"], c: 0, e: "Future outcome uses 'will catch'." }
    ];

    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let globalCounter = 1;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGame() {
        // Clone and shuffle to implement loop variation
        questions = shuffle([...pool]);
        currentIndex = 0;
    }

    function loadQuestion() {
        if (currentIndex >= questions.length) {
            initGame(); // Reset and reshuffle to trigger the infinite loop seamlessly
        }

        const current = questions[currentIndex];
        document.getElementById("progress").innerText = `Question ${globalCounter}`;
        document.getElementById("question").innerText = current.q;
        
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";

        // Copy and shuffle options keeping track of the true correct answer
        let choices = current.a.map((text, idx) => ({ text, isCorrect: idx === current.c }));
        shuffle(choices);

        choices.forEach(choice => {
            const button = document.createElement("button");
            button.className = "btn";
            button.innerText = choice.text;
            button.onclick = () => selectAnswer(button, choice.isCorrect, current.e);
            optionsContainer.appendChild(button);
        });

        document.getElementById("feedback-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
    }

    function selectAnswer(selectedBtn, isCorrect, explanation) {
        const buttons = document.querySelectorAll(".options-container .btn");
        buttons.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            selectedBtn.classList.add("correct");
            score++;
            document.getElementById("score").innerText = score;
            document.getElementById("feedback-status").innerText = "✨ Correct!";
            document.getElementById("feedback-status").style.color = "var(--success)";
        } else {
            selectedBtn.classList.add("wrong");
            document.getElementById("feedback-status").innerText = "❌ Incorrect";
            document.getElementById("feedback-status").style.color = "var(--danger)";
            
            // Highlight the proper answer
            buttons.forEach(btn => {
                // In a true environment we find the correct text choice matching pool element
                if (btn.innerText === questions[currentIndex].a[questions[currentIndex].c]) {
                    btn.classList.add("correct");
                }
            });
        }

        document.getElementById("explanation").innerText = explanation;
        document.getElementById("feedback-box").style.display = "block";
        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        globalCounter++;
        loadQuestion();
    }

    // Start game initially
    initGame();
    loadQuestion();
</script>

</body>
</html>
