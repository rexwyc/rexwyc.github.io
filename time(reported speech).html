<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reported Speech Trainer</title>
    <style>
        :root { --primary: #4A90E2; --success: #48BB78; --error: #F56565; --bg: #F7FAFC; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        #game-card { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 25px; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-between; color: #718096; font-size: 0.9rem; margin-bottom: 20px; font-weight: bold; }
        .question-area { min-height: 120px; margin-bottom: 20px; }
        .direct-speech { background: #EDF2F7; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-style: italic; color: #2D3748; }
        .reported-speech { font-size: 1.1rem; color: #1A202C; line-height: 1.6; }
        .blank { border-bottom: 2px solid var(--primary); color: var(--primary); font-weight: bold; padding: 0 5px; }
        input { width: 100%; padding: 15px; border: 2px solid #E2E8F0; border-radius: 12px; font-size: 1.1rem; outline: none; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn-check { background: var(--primary); color: white; }
        .btn-next { background: var(--success); color: white; display: none; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; animation: fadeIn 0.3s; }
        .explanation { font-size: 0.9rem; margin-top: 8px; line-height: 1.4; opacity: 0.9; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="game-card">
    <div class="stats">
        <span id="progress">Question: 1/30</span>
        <span id="score">Score: 0</span>
    </div>
    
    <div class="question-area">
        <div class="direct-speech" id="direct-text">"I am here," she said.</div>
        <div class="reported-speech" id="reported-text">She said she was <span class="blank">____</span>.</div>
    </div>

    <input type="text" id="answer-input" placeholder="Type the missing word..." autocomplete="off" spellcheck="false">
    
    <button class="btn-check" id="check-btn">Check Answer</button>
    <button class="btn-next" id="next-btn">Next Question →</button>

    <div id="feedback">
        <div id="result-text" style="font-weight: bold;"></div>
        <div class="explanation" id="explanation-text"></div>
    </div>
</div>

<script>
    const quizData = [
        { d: '"I am busy," said Tom.', r: 'Tom said that [he] was busy.', a: 'he', e: 'Pronoun: "I" changes to "he" to match Tom.' },
        { d: '"I live here," she said.', r: 'She said she lived [there].', a: 'there', e: 'Place: "Here" always changes to "there".' },
        { d: '"We are ready," they said.', r: 'They said [they] were ready.', a: 'they', e: 'Pronoun: "We" changes to "they".' },
        { d: '"I will go tomorrow," he said.', r: 'He said he would go [the next day].', a: 'the next day', e: 'Time: "Tomorrow" becomes "the next day" or "the following day".' },
        { d: '"I saw them yesterday," she said.', r: 'She said she had seen them [the day before].', a: 'the day before', e: 'Time: "Yesterday" becomes "the day before" or "the previous day".' },
        { d: '"This is my car," he said.', r: 'He said [that] was his car.', a: 'that', e: 'Word: "This" (as a subject) becomes "that".' },
        { d: '"I like these books," she said.', r: 'She said she liked [those] books.', a: 'those', e: 'Word: "These" changes to "those".' },
        { d: '"I am eating now," he said.', r: 'He said he was eating [then].', a: 'then', e: 'Time: "Now" usually changes to "then".' },
        { d: '"I will call you tonight," she said.', r: 'She said she would call me [that night].', a: 'that night', e: 'Time: "Tonight" becomes "that night".' },
        { d: '"We moved a year ago," they said.', r: 'They said they had moved a year [before].', a: 'before', e: 'Time: "Ago" becomes "before".' },
        { d: '"You must help us," they told me.', r: 'They told me I had to help [them].', a: 'them', e: 'Pronoun: "Us" becomes "them".' },
        { d: '"I lost my keys," he said.', r: 'He said he had lost [his] keys.', a: 'his', e: 'Possessive: "My" changes to "his" to match the speaker.' },
        { d: '"I will be there next week," she said.', r: 'She said she would be there [the following week].', a: 'the following week', e: 'Time: "Next week" becomes "the following week".' },
        { d: '"Is this your bag?" he asked me.', r: 'He asked me if that was [my] bag.', a: 'my', e: 'Possessive: "Your" changes to "my" because he asked ME.' },
        { d: '"I am staying here," she said.', r: 'She said she was staying [there].', a: 'there', e: 'Place: "Here" becomes "there".' },
        { d: '"We will see you later," they said.', r: 'They said they would see [us] later.', a: 'us', e: 'Pronoun: "You" (plural) often becomes "us".' },
        { d: '"I finished this today," he said.', r: 'He said he had finished that [that day].', a: 'that day', e: 'Time: "Today" becomes "that day".' },
        { d: '"These apples are sweet," she said.', r: 'She said [those] apples were sweet.', a: 'those', e: 'Word: "These" becomes "those".' },
        { d: '"I was here last night," he said.', r: 'He said he had been there [the night before].', a: 'the night before', e: 'Time: "Last night" becomes "the night before".' },
        { d: '"I can see you," she told him.', r: 'She told him she could see [him].', a: 'him', e: 'Pronoun: "You" changes to "him" to match the listener.' },
        { d: '"Our team won," they said.', r: 'They said [their] team had won.', a: 'their', e: 'Possessive: "Our" changes to "their".' },
        { d: '"I like this song," she said.', r: 'She said she liked [that] song.', a: 'that', e: 'Word: "This" (as an adjective) becomes "that".' },
        { d: '"I will come next month," he said.', r: 'He said he would come [the following month].', a: 'the following month', e: 'Time: "Next month" becomes "the following month".' },
        { d: '"We are happy here," they said.', r: 'They said they were happy [there].', a: 'there', e: 'Place: "Here" to "there".' },
        { d: '"You are late," the boss told her.', r: 'The boss told her that [she] was late.', a: 'she', e: 'Pronoun: "You" becomes "she" to match the listener.' },
        { d: '"I bought these yesterday," he said.', r: 'He said he had bought those [the day before].', a: 'the day before', e: 'Time: "Yesterday" to "the day before".' },
        { d: '"I am leaving now," she said.', r: 'She said she was leaving [then].', a: 'then', e: 'Time: "Now" to "then".' },
        { d: '"It is cold today," they said.', r: 'They said it was cold [that day].', a: 'that day', e: 'Time: "Today" to "that day".' },
        { d: '"Give this to me," he said.', r: 'He told me to give that to [him].', a: 'him', e: 'Pronoun: "Me" changes to "him".' },
        { d: '"I will wait here," she said.', r: 'She said she would wait [there].', a: 'there', e: 'Place: "Here" to "there".' }
    ];

    let currentIdx = 0;
    let score = 0;

    const directEl = document.getElementById('direct-text');
    const reportedEl = document.getElementById('reported-text');
    const inputEl = document.getElementById('answer-input');
    const feedbackEl = document.getElementById('feedback');
    const scoreEl = document.getElementById('score');
    const progressEl = document.getElementById('progress');
    const checkBtn = document.getElementById('check-btn');
    const nextBtn = document.getElementById('next-btn');

    function loadQuestion() {
        const item = quizData[currentIdx];
        directEl.innerText = item.d;
        reportedEl.innerHTML = item.r.replace(/\[.*?\]/, '<span class="blank">____</span>');
        inputEl.value = '';
        inputEl.style.display = 'block';
        feedbackEl.style.display = 'none';
        checkBtn.style.display = 'block';
        nextBtn.style.display = 'none';
        progressEl.innerText = `Question: ${currentIdx + 1}/30`;
        inputEl.focus();
    }

    function checkAnswer() {
        const userAns = inputEl.value.trim().toLowerCase();
        const correctAns = quizData[currentIdx].a.toLowerCase();
        
        feedbackEl.style.display = 'block';
        checkBtn.style.display = 'none';
        nextBtn.style.display = 'block';

        if (userAns === correctAns) {
            score++;
            scoreEl.innerText = `Score: ${score}`;
            feedbackEl.style.background = '#C6F6D5';
            feedbackEl.style.color = '#22543D';
            document.getElementById('result-text').innerText = "Correct! ✨";
        } else {
            feedbackEl.style.background = '#FED7D7';
            feedbackEl.style.color = '#822727';
            document.getElementById('result-text').innerText = `Incorrect. Answer: ${quizData[currentIdx].a}`;
        }
        document.getElementById('explanation-text').innerText = quizData[currentIdx].e;
    }

    checkBtn.onclick = checkAnswer;
    nextBtn.onclick = () => {
        currentIdx = (currentIdx + 1) % quizData.length; // Infinite loop
        loadQuestion();
    };

    inputEl.onkeypress = (e) => { if(e.key === 'Enter') checkBtn.style.display === 'block' ? checkAnswer() : nextBtn.click(); };

    loadQuestion();
</script>

</body>
</html>
