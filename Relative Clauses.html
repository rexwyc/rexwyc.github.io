<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Infinite Relative Clauses</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --text-main: #1f2937;
            --text-sub: #4b5563;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e5e7eb;
        }

        /* Prevent zooming on mobile tap */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .score-badge {
            background: #dbeafe;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .question-box {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        /* Large hit targets for mobile fingers */
        .option-btn {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s;
            width: 100%;
        }

        .option-btn:active:not([disabled]) {
            background: #f3f4f6;
        }

        .option-btn.correct {
            background-color: #ecfdf5;
            border-color: var(--success);
            color: #065f46;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fef2f2;
            border-color: var(--danger);
            color: #991b1b;
        }

        .explanation-card {
            background: #f8fafc;
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 12px 14px;
            margin-top: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text-sub);
            display: none;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 16px;
            display: none;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        }

        .action-btn:shadow {
            opacity: 0.95;
        }
    </style>
</head>
<body>

<div class="game-card">
    <div class="header">
        <h1 class="title">Relative Clauses</h1>
        <div class="score-badge">Score: <span id="score-val">0</span></div>
    </div>

    <div class="question-box" id="q-text">Loading...</div>

    <div class="options-list" id="options-box"></div>

    <div class="explanation-card" id="exp-box"></div>

    <button class="action-btn" id="next-btn" onclick="handleNext()">Next Question &rarr;</button>
</div>

<script>
    // Pool of questions to pull from endlessly
    const questionPool = [
        { q: "The woman _______ lives next door is an architect.", options: ["who", "which", "whose", "whom"], correct: "who", exp: "Use 'who' for people acting as the subject of the clause." },
        { q: "The mobile app _______ I downloaded is crashing.", options: ["who", "which", "where", "whose"], correct: "which", exp: "Use 'which' (or 'that') for objects, devices, and things." },
        { q: "The designer _______ laptop broke lost all her work.", options: ["who", "whom", "whose", "which"], correct: "whose", exp: "Use 'whose' to show possession (the laptop belonging to the designer)." },
        { q: "This is the cafe _______ we had our first meeting.", options: ["which", "where", "when", "that"], correct: "where", exp: "Use 'where' to refer to a place or physical location context." },
        { q: "I'll never forget the day _______ I started my own business.", options: ["where", "which", "when", "whose"], correct: "when", exp: "Use 'when' to refer to time periods, days, or moments." },
        { q: "The client with _______ I was speaking is very satisfied.", options: ["who", "whom", "which", "that"], correct: "whom", exp: "Always use 'whom' for people directly following a preposition like 'with'." },
        { q: "The documents _______ you left on the desk are confidential.", options: ["who", "that", "where", "whose"], correct: "that", exp: "Use 'that' (or 'which') to define non-human objects." },
        { q: "Paris, _______ is known as the City of Light, is beautiful.", options: ["that", "which", "where", "who"], correct: "which", exp: "In non-defining clauses (with commas), you must use 'which', never 'that'." },
        { q: "The reason _______ she took the day off is unknown.", options: ["why", "which", "where", "when"], correct: "why", exp: "Use 'why' to explain reasons, usually following the word 'reason'." },
        { q: "Employees _______ keys are missing should report to security.", options: ["who", "whom", "whose", "which"], correct: "whose", exp: "Use 'whose' for possession (the keys belonging to the employees)." }
    ];

    let currentQuestion = null;
    let score = 0;
    let activeQueue = [];

    function shuffleArray(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    function initNextQuestion() {
        // Infinite loop engine: refill queue from pool when empty
        if (activeQueue.length === 0) {
            activeQueue = shuffleArray([...questionPool]);
        }
        
        currentQuestion = activeQueue.pop();
        
        document.getElementById("q-text").innerText = currentQuestion.q;
        document.getElementById("exp-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";
        
        const optionsBox = document.getElementById("options-box");
        optionsBox.innerHTML = "";

        // Shuffle the choice options for variety
        const shuffledOptions = shuffleArray([...currentQuestion.options]);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => verifyAnswer(opt, btn);
            optionsBox.appendChild(btn);
        });
    }

    function verifyAnswer(selectedOpt, selectedBtn) {
        const allButtons = document.querySelectorAll(".option-btn");
        allButtons.forEach(btn => btn.disabled = true); // Freeze further inputs

        const isCorrect = selectedOpt === currentQuestion.correct;

        if (isCorrect) {
            selectedBtn.classList.add("correct");
            score++;
            document.getElementById("score-val").innerText = score;
        } else {
            selectedBtn.classList.add("wrong");
            // Highlight correct one for visual feedback
            allButtons.forEach(btn => {
                if (btn.innerText === currentQuestion.correct) btn.classList.add("correct");
            });
        }

        // Show detailed rule explanation card
        const expBox = document.getElementById("exp-box");
        expBox.innerHTML = `<strong>${isCorrect ? 'Correct!' : 'Incorrect.'}</strong> ${currentQuestion.exp}`;
        expBox.style.display = "block";
        
        document.getElementById("next-btn").style.display = "block";
    }

    function handleNext() {
        initNextQuestion();
    }

    // Launch game instantly
    initNextQuestion();
</script>

</body>
</html>
