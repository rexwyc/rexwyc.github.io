<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Equations Practice Game</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --text: #1f2937;
            --text-muted: #4b5563;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 12px;
        }

        .score-box, .progress-box {
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .score-box span, .progress-box span {
            color: var(--primary);
            font-size: 1.1rem;
        }

        .system-display {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: none;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            color: var(--text);
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .option-btn:hover:not([disabled]) {
                border-color: var(--primary);
                background-color: #eff6ff;
            }
        }

        .option-btn:active:not([disabled]) {
            background-color: #eff6ff;
        }

        .option-btn.correct {
            background-color: #d1fae5;
            border-color: var(--success);
            color: #065f46;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: var(--error);
            color: #991b1b;
        }

        .feedback-panel {
            display: none;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 16px;
            font-size: 0.95rem;
        }

        .feedback-panel.incorrect-style {
            background: #fffbeb;
            border-color: #fde68a;
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 1.05rem;
        }

        .feedback-panel.incorrect-style .feedback-title {
            color: #b45309;
        }

        .feedback-panel:not(.incorrect-style) .feedback-title {
            color: #047857;
        }

        .steps {
            margin-top: 8px;
            padding-left: 20px;
            line-height: 1.5;
            color: var(--text-muted);
        }

        .steps li {
            margin-bottom: 4px;
        }

        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: none;
        }

        .action-btn:hover {
            background: var(--primary-hover);
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="progress-box">Question: <span id="q-num">1</span>/50</div>
        <div class="score-box">Score: <span id="score">0</span></div>
    </div>

    <div id="question-text" style="font-weight: 500; color: var(--text-muted);">Solve the system:</div>
    <div class="system-display" id="system-box">
        2x + 3y = 12<br>
        2x - y = 4
    </div>

    <div class="options-grid" id="options-container">
        </div>

    <div class="feedback-panel" id="feedback-box">
        <div class="feedback-title" id="feedback-status">Correct!</div>
        <ol class="steps" id="steps-list">
            </ol>
    </div>

    <button class="action-btn" id="next-btn">Next Question</button>
</div>

<script>
    // System Configurations for 50 unique variations
    const templates = [
        {a1:1, b1:1, c1:5, a2:1, b2:-1, c2:1, x:3, y:2},
        {a1:2, b1:3, c1:12, a2:2, b2:-1, c2:4, x:3, y:2},
        {a1:1, b1:2, c1:8, a2:1, b2:-1, c2:2, x:4, y:2},
        {a1:3, b1:1, c1:7, a2:1, b2:1, c2:3, x:2, y:1},
        {a1:2, b1:1, c1:10, a2:1, b2:-1, c2:2, x:4, y:2},
        {a1:1, b1:3, c1:10, a2:1, b2:1, c2:4, x:1, y:3},
        {a1:4, b1:2, c1:14, a2:1, b2:-2, c2:-4, x:2, y:3},
        {a1:1, b1:1, c1:6, a2:2, b2:1, c2:9, x:3, y:3},
        {a1:3, b1:2, c1:12, a2:1, b2:-2, c2:0, x:3, y:1.5}, // Handled nicely below
        {a1:2, b1:2, c1:10, a2:1, b2:-1, c2:1, x:3, y:2},
        {a1:1, b1:1, c1:7, a2:1, b2:-1, c2:3, x:5, y:2},
        {a1:2, b1:1, c1:8, a2:1, b2:1, c2:5, x:3, y:2},
        {a1:3, b1:-1, c1:5, a2:1, b2:1, c2:3, x:2, y:1},
        {a1:1, b1:4, c1:9, a2:1, b2:-1, c2:-1, x:1, y:2},
        {a1:2, b1:3, c1:13, a2:1, b2:-1, c2:-1, x:2, y:3},
        {a1:5, b1:1, c1:12, a2:1, b2:-1, c2:0, x:2, y:2},
        {a1:1, b1:2, c1:7, a2:3, b2:-2, c2:1, x:2, y:2.5},
        {a1:3, b1:2, c1:8, a2:2, b2:-2, c2:2, x:2, y:1},
        {a1:4, b1:-1, c1:7, a2:2, b2:1, c2:5, x:2, y:1},
        {a1:1, b1:1, c1:4, a2:2, b2:3, c2:9, x:3, y:1},
        {a1:3, b1:1, c1:11, a2:1, b2:3, c2:9, x:3, y:2},
        {a1:2, b1:-1, c1:5, a2:3, b2:1, c2:10, x:3, y:1},
        {a1:1, b1:2, c1:5, a2:4, b2:-2, c2:0, x:1, y:2},
        {a1:5, b1:2, c1:16, a2:1, b2:-2, c2:2, x:3, y:0.5},
        {a1:2, b1:4, c1:16, a2:2, b2:-1, c2:6, x:4, y:2},
        {a1:1, b1:-1, c1:2, a2:3, b2:2, c2:16, x:4, y:2},
        {a1:3, b1:3, c1:15, a2:1, b2:-1, c2:1, x:3, y:2},
        {a1:4, b1:1, c1:9, a2:1, b2:1, c2:3, x:2, y:1},
        {a1:2, b1:3, c1:8, a2:2, b2:-3, c2:-4, x:1, y:2},
        {a1:1, b1:5, c1:11, a2:1, b2:-1, c2:5, x:6, y:1},
        {a1:3, b1:2, c1:13, a2:1, b2:2, c2:7, x:3, y:2},
        {a1:2, b1:1, c1:7, a2:4, b2:-1, c2:5, x:2, y:3},
        {a1:1, b1:3, c1:7, a2:2, b2:1, c2:9, x:4, y:1},
        {a1:4, b1:-2, c1:10, a2:1, b2:2, c2:5, x:2.5, y:0},
        {a1:3, b1:1, c1:10, a2:2, b2:-1, c2:5, x:3, y:1},
        {a1:1, b1:1, c1:8, a2:3, b2:-1, c2:4, x:3, y:5},
        {a1:2, b1:2, c1:12, a2:4, b2:-2, c2:0, x:2, y:4},
        {a1:5, b1:-1, c1:9, a2:2, b2:1, c2:5, x:2, y:1},
        {a1:1, b1:2, c1:10, a2:3, b2:1, c2:15, x:4, y:3},
        {a1:2, b1:3, c1:7, a2:1, b2:-1, c2:1, x:2, y:1},
        {a1:4, b1:2, c1:16, a2:2, b2:2, c2:10, x:3, y:2},
        {a1:1, b1:1, c1:2, a2:2, b2:-1, c2:7, x:3, y:-1},
        {a1:3, b1:-2, c1:12, a2:1, b2:2, c2:4, x:4, y:0},
        {a1:2, b1:1, c1:9, a2:1, b2:-1, c2:3, x:4, y:1},
        {a1:5, b1:2, c1:17, a2:1, b2:2, c2:5, x:3, y:1},
        {a1:1, b1:4, c1:14, a2:3, b2:-4, c2:2, x:4, y:2.5},
        {a1:2, b1:-1, c1:7, a2:4, b2:1, c2:17, x:4, y:1},
        {a1:3, b1:3, c1:9, a2:1, b2:-1, c2:1, x:2, y:1},
        {a1:4, b1:1, c1:13, a2:2, b2:-1, c2:5, x:3, y:1},
        {a1:1, b1:2, c1:8, a2:2, b2:2, c2:10, x:2, y:3}
    ];

    let currentQIdx = 0;
    let totalQuestionsAnswered = 0; // Tracks globally for true infinite looping state tracking
    let score = 0;
    let hasAnswered = false;

    const scoreEl = document.getElementById('score');
    const qNumEl = document.getElementById('q-num');
    const systemBox = document.getElementById('system-box');
    const optionsContainer = document.getElementById('options-container');
    const feedbackBox = document.getElementById('feedback-box');
    const feedbackStatus = document.getElementById('feedback-status');
    const stepsList = document.getElementById('steps-list');
    const nextBtn = document.getElementById('next-btn');

    function formatTerm(coeff, variable, isFirst = false) {
        if (coeff === 0) return '';
        let sign = coeff > 0 ? (isFirst ? '' : ' + ') : (isFirst ? '-' : ' - ');
        let absCoeff = Math.abs(coeff);
        let coeffStr = absCoeff === 1 ? '' : absCoeff;
        return `${sign}${coeffStr}${variable}`;
    }

    function formatEquation(a, b, c) {
        let part1 = formatTerm(a, 'x', true);
        let part2 = formatTerm(b, 'y', part1 === '');
        if (part1 === '' && part2 === '') return `0 = ${c}`;
        return `${part1}${part2} = ${c}`;
    }

    function loadQuestion() {
        hasAnswered = false;
        feedbackBox.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        // Loop index within bounds [0..49], fulfilling infinite gameplay requirements loops seamlessly
        let activeIndex = currentQIdx % templates.length;
        const q = templates[activeIndex];
        
        // Dynamic structural progression text updates
        qNumEl.textContent = (totalQuestionsAnswered + 1);

        // Display equation pair neatly
        systemBox.innerHTML = `${formatEquation(q.a1, q.b1, q.c1)}<br>${formatEquation(q.a2, q.b2, q.c2)}`;

        // Formulate the distinct answers set
        const correctStr = `x = ${q.x}, y = ${q.y}`;
        let optionsSet = new Set([correctStr]);

        // Generate algorithmic distractors uniquely to prevent system breaks
        while(optionsSet.size < 4) {
            let offsetArr = [[1, -1], [-1, 1], [2, -2], [0, 2], [-1, -1], [2, 1]];
            let picker = offsetArr[Math.floor(Math.random() * offsetArr.length)];
            let fakeX = q.x + picker[0];
            let fakeY = q.y + picker[1];
            if(fakeX !== q.x || fakeY !== q.y) {
                optionsSet.add(`x = ${fakeX}, y = ${fakeY}`);
            }
        }

        // Shuffle
        const optionsArray = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        optionsArray.forEach(optText => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = optText;
            btn.addEventListener('click', () => handleAnswerSelect(btn, optText, correctStr, q));
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswerSelect(selectedBtn, chosenText, correctText, data) {
        if (hasAnswered) return;
        hasAnswered = true;

        const isCorrect = chosenText === correctText;
        
        // Disable choices right away & provide colors
        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => {
            btn.disabled = true;
            if (btn.textContent === correctText) {
                btn.classList.add('correct');
            }
        });

        if (isCorrect) {
            score++;
            scoreEl.textContent = score;
            feedbackStatus.textContent = "Correct!";
            feedbackBox.classList.remove('incorrect-style');
        } else {
            selectedBtn.classList.add('wrong');
            feedbackStatus.textContent = "Incorrect";
            feedbackBox.classList.add('incorrect-style');
        }

        // Generate Custom Step Breakdown Rules
        stepsList.innerHTML = `
            <li>Identify Target Set:<br><b>(1)</b> $ ${formatEquation(data.a1, data.b1, data.c1)} $<br><b>(2)</b> $ ${formatEquation(data.a2, data.b2, data.c2)} $</li>
            <li>Using logical checking operations, substituting correct solutions targets values directly:</li>
            <li>Let's verify $ x = ${data.x} $ and $ y = ${data.y} $:</li>
            <li>Equation 1 Verify: $ ${data.a1}(${data.x}) + ${data.b1 === 1 ? '' : data.b1 === -1 ? '-' : data.b1}(${data.y}) = ${data.c1} $ ✓</li>
            <li>Equation 2 Verify: $ ${data.a2}(${data.x}) + ${data.b2 === 1 ? '' : data.b2 === -1 ? '-' : data.b2}(${data.y}) = ${data.c2} $ ✓</li>
        `;

        feedbackBox.style.display = 'block';
        nextBtn.style.display = 'block';
    }

    nextBtn.addEventListener('click', () => {
        currentQIdx++;
        totalQuestionsAnswered++;
        loadQuestion();
    });

    // Start Up initialization setup sequence
    loadQuestion();
</script>

</body>
</html>
